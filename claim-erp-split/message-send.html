<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>메시지 발송 | CLAIM ERP</title>
<style>
  /* ===== 메시지 발송 — 기존 ERP 디자인 톤(common.css)에 맞춘 밀도·타이포 ===== */
  :root{
    --bg:#F6F8FB; --card:#FFFFFF; --line:#E6EAF2; --line-strong:#D4DAE6;
    --text:#1B2430; --text-sub:#5B6678; --text-dim:#8A94A6;
    --blue:#2563EB; --blue-dark:#1D4ED8; --blue-soft:#EFF6FF; --blue-line:#BFDBFE;
    --red:#DC2626; --amber:#B45309; --amber-soft:#FEF3C7; --green:#15803D;
    --radius:12px; --shadow:0 1px 2px rgba(16,30,54,.04), 0 6px 20px rgba(16,30,54,.06);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",system-ui,-apple-system,sans-serif;
    background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; }
  button{ font-family:inherit; }

  /* 헤더 */
  .hd{ background:#fff; border-bottom:1px solid var(--line); padding:11px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .hd .t{ font-size:16px; font-weight:800; letter-spacing:-.2px; }
  .hd .t::before{ content:""; display:inline-block; width:6px; height:16px; background:var(--blue); border-radius:3px; margin-right:9px; vertical-align:-2px; }
  .hd .meta{ font-size:13px; color:var(--text-sub); }
  .hd .meta b{ font-weight:700; color:var(--text); }
  .hd .sp{ flex:1; }
  .hd .role{ display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--text-sub); }
  .hd .role select{ font-size:12.5px; font-family:inherit; padding:5px 8px; border-radius:8px; border:1px solid var(--line-strong); background:#fff; color:var(--text); }

  /* 안내줄 */
  .notice{ background:var(--amber-soft); color:var(--amber); font-size:12.5px; font-weight:600; padding:8px 18px; border-bottom:1px solid #F0E4C0; }
  .notice b{ color:var(--red); }

  /* 본문 2단 */
  .wrap{ display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:14px 18px 22px; align-items:start; }
  @media (max-width:880px){ .wrap{ grid-template-columns:1fr; } }
  .col{ display:flex; flex-direction:column; gap:12px; }

  .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
  .card-h{ display:flex; align-items:center; gap:8px; padding:9px 13px; background:#F7F9FC; border-bottom:1px solid var(--line); }
  .card-h .no{ display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:6px; background:var(--blue); color:#fff; font-size:12px; font-weight:800; flex:none; }
  .card-h .ti{ font-size:14px; font-weight:800; }
  .card-h .hint{ font-size:11.5px; color:var(--text-dim); font-weight:600; }
  .card-b{ padding:10px 12px; }

  /* 템플릿 리스트 */
  .tpl-list{ display:flex; flex-direction:column; gap:5px; max-height:250px; overflow:auto; }
  .tpl{ display:flex; align-items:center; gap:9px; text-align:left; width:100%; cursor:pointer;
    border:1px solid var(--line); background:#fff; border-radius:9px; padding:7px 10px; }
  .tpl:hover{ border-color:var(--blue-line); background:#FAFCFF; }
  .tpl.on{ border-color:var(--blue); background:var(--blue-soft); }
  .tpl .cat{ font-size:11px; font-weight:800; color:#fff; border-radius:5px; padding:2px 7px; flex:none; min-width:80px; text-align:center; }
  .tpl .cat.at{ background:#6D4FC0; }
  .tpl .cat.lms{ background:var(--green); }
  .tpl .cat.free{ background:#8A94A6; }
  .tpl .body{ min-width:0; }
  .tpl .tt{ font-size:13px; font-weight:700; color:var(--text); }
  .tpl .ts{ font-size:11.5px; color:var(--text-dim); margin-top:1px; }
  .tpl.on .tt{ color:var(--blue-dark); }

  /* 발신 안내 */
  .sender-note{ font-size:12px; color:var(--text-sub); margin:2px 0 10px; padding:8px 10px; background:#F7F9FC; border:1px solid var(--line); border-radius:8px; }
  .sender-note b{ color:var(--blue); }
  .sender-note .miss{ color:var(--red); font-weight:700; }

  /* 왼쪽 버튼줄 */
  .lbtns{ display:flex; gap:8px; flex-wrap:wrap; }
  .lbtn{ flex:1; min-width:96px; font-size:12.5px; font-weight:700; padding:9px 8px; border-radius:8px;
    border:1px solid var(--blue); background:#fff; color:var(--blue); cursor:pointer; }
  .lbtn:hover{ background:var(--blue-soft); }
  .lbtn.admin{ border-color:var(--amber); color:var(--amber); }
  .lbtn.admin:hover{ background:var(--amber-soft); }

  /* 수신자 목록 */
  .rc-head{ display:grid; grid-template-columns:34px 1fr 1.3fr 1.4fr; gap:8px; padding:4px 8px; font-size:11.5px; font-weight:800; color:var(--text-dim); }
  .rc-list{ display:flex; flex-direction:column; gap:5px; }
  .rc{ display:grid; grid-template-columns:34px 1fr 1.3fr 1.4fr; gap:8px; align-items:center;
    border:1px solid var(--line); border-radius:9px; padding:7px 8px; }
  .rc.on{ border-color:var(--blue); background:var(--blue-soft); }
  .rc.bad{ border-color:#F1C6C6; background:#FDF2F2; }
  .rc input[type=checkbox]{ width:17px; height:17px; accent-color:var(--blue); cursor:pointer; justify-self:center; }
  .rc .gb{ font-size:11.5px; font-weight:700; color:var(--text-sub); line-height:1.35; }
  .rc .nm{ font-size:13px; font-weight:700; }
  .rc .ph{ font-size:13px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; letter-spacing:.2px; }
  .rc .bad-t{ font-size:11px; color:var(--red); font-weight:700; }

  .rc-manual{ display:flex; gap:6px; align-items:center; margin-top:8px; flex-wrap:wrap; }
  .rc-manual input{ font-size:12.5px; font-family:inherit; padding:8px 9px; border:1px solid var(--line-strong); border-radius:8px; }
  .rc-manual .mn{ width:96px; } .rc-manual .mp{ flex:1; min-width:150px; }
  .rc-manual .add{ font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:8px; border:1px solid var(--blue); background:var(--blue); color:#fff; cursor:pointer; }

  /* 발송 내용 */
  .content-ta{ width:100%; min-height:118px; font-size:13.5px; line-height:1.6; font-family:inherit;
    border:1px solid var(--line-strong); border-radius:10px; padding:11px; resize:vertical; color:var(--text); }
  .content-ta:focus{ outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.13); }
  .content-ta[readonly]{ background:#F5F7FA; color:var(--text-sub); }
  .content-meta{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:7px; font-size:12.5px; }
  .tag{ font-size:11px; font-weight:800; border-radius:5px; padding:2px 8px; }
  .tag.at{ color:#5B3AA0; background:#EEE7FA; }
  .tag.sms{ color:var(--green); background:#E1F5EA; }
  .tag.lms{ color:var(--amber); background:var(--amber-soft); }
  .len{ color:var(--text-sub); font-weight:700; }
  .len.over{ color:var(--red); }
  .miss{ color:var(--red); font-weight:800; font-size:12px; }

  /* 발송 버튼 */
  .send-row{ display:flex; align-items:center; gap:10px; margin-top:11px; }
  .send-row .sp{ flex:1; }
  .send-btn{ font-size:14px; font-weight:800; padding:10px 26px; border-radius:10px; border:0;
    background:var(--blue); color:#fff; cursor:pointer; box-shadow:0 2px 8px rgba(37,99,235,.24); }
  .send-btn:hover:not(:disabled){ background:var(--blue-dark); }
  .send-btn:disabled{ background:#B7C1D4; box-shadow:none; cursor:not-allowed; }

  /* 토스트 */
  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(16px);
    background:#1B2430; color:#fff; font-size:13px; font-weight:600; padding:11px 20px; border-radius:11px;
    box-shadow:0 10px 30px rgba(16,30,54,.32); opacity:0; pointer-events:none; transition:opacity .18s, transform .18s; max-width:88vw; text-align:center; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* 확인 모달 */
  .ov{ position:fixed; inset:0; background:rgba(16,24,40,.42); display:none; align-items:center; justify-content:center; z-index:50; padding:18px; }
  .ov.open{ display:flex; }
  .dlg{ background:#fff; border-radius:14px; width:460px; max-width:100%; overflow:hidden; box-shadow:0 20px 50px rgba(16,30,54,.3); }
  .dlg-h{ font-size:16px; font-weight:800; padding:14px 18px; border-bottom:1px solid var(--line); }
  .dlg-b{ padding:16px 18px; font-size:13.5px; color:var(--text); }
  .dlg-b .big{ font-size:15px; font-weight:800; margin-bottom:8px; }
  .dlg-b .big b{ color:var(--blue); }
  .dlg-pv{ border:1px solid var(--line); border-radius:9px; padding:11px; margin-top:8px; background:#FAFBFD; white-space:pre-wrap; word-break:break-all; font-size:13px; line-height:1.6; max-height:200px; overflow:auto; }
  .dlg-note{ font-size:12px; color:var(--text-sub); margin-top:9px; }
  .dlg-f{ display:flex; justify-content:flex-end; gap:8px; padding:12px 18px 16px; }
  .dlg-btn{ font-size:13px; font-weight:700; padding:9px 18px; border-radius:9px; cursor:pointer; border:1px solid var(--line-strong); background:#fff; color:var(--text-sub); }
  .dlg-btn:hover{ border-color:var(--text-dim); }
  .dlg-btn.primary{ border-color:var(--blue); background:var(--blue); color:#fff; }
  .dlg-btn.primary:hover{ background:var(--blue-dark); }

  .empty{ font-size:12.5px; color:var(--text-dim); padding:8px 4px; }

  /* 기능 설명 툴팁 (hover 시 노출) */
  [data-desc]{ cursor:help; }
  .tpl[data-desc], .lbtn[data-desc], .send-btn[data-desc], .rc[data-desc], .dlg-btn[data-desc], .set-mini[data-desc], button[data-desc]{ cursor:pointer; }
  input[data-desc], textarea[data-desc], select[data-desc]{ cursor:auto; }
  #clTooltip{
    position:fixed; z-index:9999; max-width:300px;
    background:#1B2430; color:#fff;
    font-size:11.5px; font-weight:500; line-height:1.55;
    padding:8px 11px; border-radius:9px;
    box-shadow:0 8px 22px rgba(16,30,54,.3);
    pointer-events:none; opacity:0; transform:translateY(4px);
    transition:opacity .12s ease, transform .12s ease;
    white-space:normal; word-break:keep-all;
  }
  #clTooltip.show{ opacity:1; transform:translateY(0); }
  #clTooltip::after{
    content:""; position:absolute; left:var(--tip-arrow, 50%);
    width:9px; height:9px; background:#1B2430;
    transform:translateX(-50%) rotate(45deg);
  }
  #clTooltip.above::after{ bottom:-4px; }
  #clTooltip.below::after{ top:-4px; }

  /* ===== 설정 모달(표준문구설정 · 주소록 · 템플릿설정) ===== */
  .set-modal{ width:940px; max-width:96vw; display:flex; flex-direction:column; max-height:90vh; }
  .set-h{ display:flex; align-items:center; gap:9px; background:var(--blue); color:#fff; padding:11px 16px; font-size:15px; }
  .set-h b{ font-weight:800; }
  .set-h .set-x{ margin-left:auto; width:28px; height:28px; border:0; border-radius:7px; background:rgba(255,255,255,.2); color:#fff; font-size:18px; cursor:pointer; }
  .set-b{ padding:14px 16px; overflow:auto; flex:1 1 auto; min-height:0; }
  .set-secth{ font-size:13px; font-weight:800; color:var(--blue-dark); margin:4px 0 7px; padding-left:7px; border-left:3px solid var(--blue); }
  .set-secth:not(:first-child){ margin-top:14px; }
  .set-hint{ font-size:12px; color:var(--text-sub); background:var(--blue-soft); border:1px solid var(--blue-line); border-radius:8px; padding:8px 11px; margin-bottom:10px; }
  .set-hint b{ color:var(--blue); }

  .set-tbl{ border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .set-tbl-h{ display:grid; background:#F1F4FA; font-size:12px; font-weight:800; color:var(--text-sub); }
  .set-tbl-h span{ padding:7px 7px; border-left:1px solid #E2E8F2; text-align:center; }
  .set-tbl-h span:first-child{ border-left:0; }
  .set-tbl-b{ overflow:auto; }
  .set-row{ display:grid; align-items:center; border-top:1px solid #EEF1F7; font-size:12.5px; }
  .set-row span{ padding:6px 7px; border-left:1px solid #F1F4F9; min-width:0; }
  .set-row span:first-child{ border-left:0; text-align:center; }
  .set-row span.l{ text-align:left; }
  .set-row input[type=checkbox]{ width:16px; height:16px; accent-color:var(--blue); cursor:pointer; }

  /* 표준문구 리스트: 10열 */
  .set-tbl-h.std, .set-row.std{ grid-template-columns:32px 42px 120px 66px 98px 74px 74px 82px 1fr 74px; }
  .set-row.std{ cursor:pointer; }
  .set-row.std.sel{ background:var(--blue-soft); }
  .set-row.std:hover{ background:#F7FAFF; }
  .set-row.std span{ text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .set-row.std span.l{ text-align:left; }
  /* 주소록: 5열 */
  .set-tbl-h.addr, .set-row.addr{ grid-template-columns:32px 62px 116px 1fr 236px; }
  .set-row.addr select, .set-row.addr input{ width:100%; box-sizing:border-box; font-size:12.5px; font-family:inherit; padding:7px 8px; border:1px solid var(--line-strong); border-radius:7px; }
  .set-row.addr .phone{ display:flex; align-items:center; gap:4px; }
  .set-row.addr .phone input{ text-align:center; }
  /* 템플릿설정: 4열 */
  .set-tbl-h.tpl, .set-row.tpl{ grid-template-columns:50px 168px 1fr 116px; }
  .set-row.tpl{ align-items:stretch; }
  .set-row.tpl .slot{ display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; color:var(--blue); }
  .set-row.tpl input, .set-row.tpl textarea{ width:100%; box-sizing:border-box; font-size:12.5px; font-family:inherit; padding:7px 8px; border:1px solid var(--line-strong); border-radius:7px; resize:vertical; }
  .set-row.tpl .ord{ display:flex; align-items:center; gap:4px; justify-content:center; }

  /* 표준문구 상세 폼 */
  .set-detail{ display:grid; grid-template-columns:1fr 1fr; gap:8px 14px; }
  .set-detail .fld{ display:flex; align-items:center; gap:8px; }
  .set-detail .fld.full{ grid-column:1 / -1; align-items:flex-start; }
  .set-detail .fld.var{ grid-column:1 / -1; }
  .set-detail .k{ width:72px; flex:none; font-size:12.5px; font-weight:700; color:var(--text-sub); }
  .set-detail input, .set-detail select, .set-detail textarea{ flex:1; min-width:0; box-sizing:border-box; font-size:13px; font-family:inherit; padding:8px 9px; border:1px solid var(--line-strong); border-radius:8px; }
  .set-detail textarea{ line-height:1.6; resize:vertical; }
  .set-detail .fld.var select{ flex:0 0 220px; }

  .set-mini{ font-size:12px; font-weight:700; padding:7px 11px; border-radius:8px; border:1px solid var(--blue); background:#fff; color:var(--blue); cursor:pointer; }
  .set-mini:hover:not(:disabled){ background:var(--blue-soft); }
  .set-mini:disabled{ border-color:#C7CEDA; color:#AAB2C0; cursor:default; }
  .set-mini.del{ border-color:#E0A3A3; color:var(--red); }
  .set-rowbtns{ display:flex; gap:7px; margin-top:9px; }
  .set-f{ display:flex; align-items:center; gap:7px; padding:11px 16px; border-top:1px solid var(--line); }
  .set-f .dlg-btn{ font-size:13px; }
</style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="confirmOv" class="ov"><div class="dlg" id="confirmDlg"></div></div>
  <div id="setOv" class="ov"><div class="dlg set-modal" id="setDlg"></div></div>
  <script src="message.js"></script>
</body>
</html>
