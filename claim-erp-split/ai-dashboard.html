<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 통합대시보드 | CLAIM ERP</title>
<link rel="stylesheet" href="common.css" />
<style>
  /* ===== AI 통합대시보드 (Pro) — 화면 전용 스타일 (common.css 토큰 재사용) ===== */
  .hidden { display: none !important; }
  #viewAi .page-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  #viewAi .page-head h1 { display: flex; align-items: center; gap: 8px; }
  .head-pro { font-size: 11px; font-weight: 700; color: var(--blue); background: var(--blue-soft); border: 1px solid var(--blue-line); border-radius: 6px; padding: 1px 7px; }

  /* --- 상단 요약카드 (어두운 배경, Plan 5.1) --- */
  .ai-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
  .ai-scard { text-align: left; padding: 16px 18px; border-radius: var(--radius); cursor: pointer;
    background: linear-gradient(160deg, #232B39 0%, #1B2430 100%); color: #E6ECF5; border: 1.5px solid #2C3647;
    transition: transform .15s, border-color .15s, box-shadow .15s; }
  .ai-scard:hover { transform: translateY(-2px); border-color: #3B82F6; }
  .ai-scard.active { border-color: #60A5FA; box-shadow: 0 4px 18px rgba(37,99,235,.35); }
  .ai-scard.warn { background: linear-gradient(160deg, #3A2A24 0%, #2A1E1A 100%); border-color: #4A342B; }
  .ai-scard.warn:hover, .ai-scard.warn.active { border-color: #F59E0B; }
  .asc-label { font-size: 12.5px; font-weight: 600; color: #9BA7BC; margin-bottom: 8px; }
  .ai-scard.warn .asc-label { color: #D7B49A; }
  .asc-value { font-size: 30px; font-weight: 800; letter-spacing: -.5px; color: #fff; }
  .asc-value small { font-size: 13px; font-weight: 700; color: #9BA7BC; margin-left: 3px; }
  .asc-sub { font-size: 11.5px; color: #8A94A6; margin-top: 6px; }
  .ai-scard.warn .asc-sub { color: #C99C86; }

  /* --- 검토요청 버튼 + 시연 배지 --- */
  .req-wrap { display: flex; align-items: center; gap: 8px; }
  .demo-badge { display: inline-flex; align-items: center; font-size: 10.5px; font-weight: 800; color: #B45309; background: var(--amber-soft); border: 1px solid #F4D48A; border-radius: 6px; padding: 2px 7px; letter-spacing: -.2px; }
  .btn-ai-req { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border: 1px solid var(--blue); border-radius: 9px; background: var(--blue); color: #fff; font-size: 13px; font-weight: 800; cursor: pointer; }
  .btn-ai-req:hover { background: var(--blue-dark); }

  /* --- 검색 필터 --- */
  #viewAi .cl-filter { padding: 14px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px 16px; flex-wrap: wrap; }
  #viewAi .clf-field { display: flex; align-items: center; gap: 7px; }
  #viewAi .clf-field label { font-size: 12.5px; font-weight: 700; color: var(--text-sub); white-space: nowrap; }
  #viewAi select, #viewAi .clf-search input { padding: 8px 12px; border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; font-size: 13px; color: var(--text); }
  #viewAi .clf-search { position: relative; flex: 1; min-width: 220px; display: flex; }
  #viewAi .clf-search input { flex: 1; padding-right: 34px; }
  #viewAi .clf-search svg { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-dim); pointer-events: none; }
  #viewAi select:focus, #viewAi input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
  #viewAi .btn-reset { padding: 8px 16px; border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; font-size: 13px; font-weight: 700; color: var(--text-sub); cursor: pointer; }
  #viewAi .btn-reset:hover { border-color: var(--text-dim); color: var(--text); }
  #viewAi .clf-count { margin-left: auto; font-size: 13px; color: var(--text-sub); }
  #viewAi .clf-count b { font-weight: 800; color: var(--text); }

  /* --- 목록 --- */
  #viewAi .list-card { padding: 4px 4px 6px; }
  .ai-table { width: 100%; border-collapse: collapse; }
  .ai-table thead th { background: #F5F8FC; font-size: 12px; font-weight: 700; color: var(--text-sub); text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  .ai-table thead th.num { text-align: right; }
  .ai-table tbody td { padding: 12px 12px; font-size: 13px; border-bottom: 1px solid var(--line); vertical-align: middle; color: var(--text); }
  .ai-table tbody tr:hover td { background: #F8FAFD; }
  .ai-table .c-seq { color: var(--text-dim); font-variant-numeric: tabular-nums; font-weight: 700; width: 40px; }
  .ai-table .c-plate { font-variant-numeric: tabular-nums; }
  .ai-table .c-id { white-space: nowrap; }
  .link-id { border: 0; background: none; color: var(--blue); font-weight: 800; font-size: 13px; cursor: pointer; padding: 0; text-decoration: underline; text-underline-offset: 2px; white-space: nowrap; }
  .ai-table .c-summary { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-sub); }
  .score-badge { display: inline-flex; align-items: center; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text); }
  .score-badge.muted { color: var(--text-dim); font-weight: 700; }
  .btn-move { padding: 6px 14px; border: 1px solid var(--blue-line); border-radius: 7px; background: var(--blue-soft); color: var(--blue-dark); font-size: 12.5px; font-weight: 800; cursor: pointer; }
  .btn-move:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
  .ai-empty { text-align: center; color: var(--text-dim); padding: 40px 0; }

  /* --- 배지 --- */
  .ai-badge, .ai-stage { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 800; white-space: nowrap; }
  .ai-stage { border-radius: 6px; font-weight: 700; }
  .st-wait { color: var(--text-sub); background: #EEF1F6; }
  .st-appr { color: var(--blue-dark); background: var(--blue-soft); }
  .st-adj { color: #6D28D9; background: #F3EEFF; }
  .st-done { color: var(--green); background: var(--green-soft); }
  .dc-wait { color: var(--amber); background: var(--amber-soft); }
  .dc-analyzing { color: var(--blue-dark); background: var(--blue-soft); }
  .dc-ok { color: var(--green); background: var(--green-soft); }
  .dc-cond { color: #B45309; background: #FEF3C7; }
  .dc-hold { color: #C2410C; background: #FFEDD5; }
  .dc-bad { color: var(--red); background: var(--red-soft); }
  .dc-fail { color: #6B7280; background: #E5E7EB; }
  .ai-flag { display: inline-flex; align-items: center; font-size: 10.5px; font-weight: 800; color: #C2410C; background: #FFEDD5; border-radius: 5px; padding: 1px 6px; margin-left: 4px; }

  /* --- 도넛 그래프 --- */
  .donut { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .donut svg { display: block; }
  /* 12시 시작 · 반시계 진행 (12→9→6→3→12). -90° 회전으로 12시 시작, 좌우 미러로 반시계 */
  .donut-prog { transform: scale(-1, 1) rotate(-90deg); transform-origin: 50% 50%; transform-box: fill-box; transition: none; }
  .donut-track { stroke: #E6EAF2; }
  .dc-ok .donut-prog { stroke: #22C55E; }
  .dc-cond .donut-prog { stroke: #F59E0B; }
  .dc-hold .donut-prog { stroke: #F97316; }
  .dc-bad .donut-prog { stroke: #EF4444; }
  .dc-analyzing .donut-prog { stroke: #3B82F6; }
  .dc-wait .donut-prog, .dc-fail .donut-prog { stroke: #9CA3AF; }
  .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1; }
  .donut-num { font-size: 20px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
  .donut.big .donut-num { font-size: 40px; }
  .donut-unit { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .donut.big .donut-unit { font-size: 12px; }

  /* --- 목록 + 우측 인라인 요약패널 (분리 컴포넌트, 오버레이 아님) --- */
  .ai-work { display: flex; align-items: flex-start; gap: 14px; }
  .ai-listcol { flex: 1; min-width: 0; }
  .ai-side { width: 384px; flex: none; background: var(--card); border: 1.5px solid var(--blue-line); border-radius: var(--radius); box-shadow: var(--shadow);
    position: sticky; top: 14px; max-height: calc(100vh - 96px); display: flex; flex-direction: column; overflow: hidden; }
  .ai-side.hidden { display: none; }
  .dw-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; padding: 15px 16px 12px; border-bottom: 1px solid var(--line); flex: none; }
  .dw-id { font-size: 15px; font-weight: 800; }
  .dw-sub { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
  .dw-close { border: 0; background: #F1F4F9; width: 28px; height: 28px; border-radius: 8px; font-size: 18px; color: var(--text-sub); cursor: pointer; flex: none; }
  .dw-close:hover { background: #E5EAF2; }
  .dw-body { padding: 15px 16px 18px; overflow-y: auto; flex: 1; min-height: 0; }
  .dw-scorewrap { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
  .dw-scoreinfo { display: flex; flex-direction: column; gap: 5px; }
  .dw-conf { font-size: 12.5px; color: var(--text-sub); }
  .dw-conf b { color: var(--text); font-weight: 800; }
  .dw-stage { font-size: 12px; color: var(--text-dim); }
  .dw-hold { font-size: 12px; font-weight: 700; color: #C2410C; background: #FFEDD5; border-radius: 8px; padding: 8px 10px; margin-bottom: 12px; }
  .dw-block { margin-bottom: 12px; }
  .dw-bt { font-size: 12px; font-weight: 800; color: var(--text-sub); margin-bottom: 6px; }
  .dw-list { margin: 0; padding-left: 16px; font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .dw-list.rec li { color: var(--blue-dark); }
  .dw-row { display: flex; gap: 8px; font-size: 12.5px; margin-bottom: 8px; }
  .dw-k { font-weight: 700; color: var(--text-sub); }
  .dw-v.warn { color: var(--amber); font-weight: 700; }
  .dw-meta { font-size: 11.5px; color: var(--text-dim); margin: 6px 0 12px; }
  .side-detail { width: 100%; padding: 9px 10px; border: 1px solid var(--blue-line); border-radius: 8px; background: var(--blue-soft); color: var(--blue-dark); font-size: 12.5px; font-weight: 800; cursor: pointer; }
  .side-detail:hover { background: #E0ECFF; }
  /* 스티키 푸터 — 스크롤해도 항상 고정 */
  .side-foot { flex: none; display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--line); background: #FAFBFD; }
  .side-btn { flex: 1 1 46%; padding: 9px 10px; border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; font-size: 12.5px; font-weight: 700; color: var(--text-sub); cursor: pointer; }
  .side-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .side-btn.edit { border-color: var(--blue-line); color: var(--blue-dark); background: var(--blue-soft); }
  .side-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .side-btn.primary:hover { background: var(--blue-dark); }
  .side-note { flex: 1 1 100%; text-align: center; font-size: 12.5px; font-weight: 700; color: var(--text-sub); padding: 4px 0; }
  .side-note.done { color: var(--green); }

  /* --- 전체 상세화면 --- */
  #viewAiDetail { padding-bottom: 40px; }
  .det-head { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
  .det-back { border: 1px solid var(--line-strong); background: #fff; border-radius: 8px; padding: 7px 13px; font-size: 13px; font-weight: 700; color: var(--text-sub); cursor: pointer; }
  .det-back:hover { border-color: var(--text-dim); color: var(--text); }
  .det-id { font-size: 18px; font-weight: 800; }
  .det-sub { font-size: 13px; color: var(--text-sub); margin-left: 8px; }
  .det-badges { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .det-mgr { font-size: 12px; color: var(--text-dim); }
  .det-hold { font-size: 13px; font-weight: 700; color: #C2410C; background: #FFEDD5; border: 1px solid #FBD9B4; border-radius: 10px; padding: 11px 14px; margin-bottom: 14px; }
  .det-hold.fail { color: var(--red); background: var(--red-soft); border-color: #F7C0C0; }
  .det-hold.reanalyze { color: var(--blue-dark); background: var(--blue-soft); border-color: var(--blue-line); }
  .det-score { display: flex; gap: 26px; align-items: center; padding: 22px 24px; margin-bottom: 14px; }
  .ds-info { flex: 1; }
  .ds-decision { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ds-review { font-size: 13px; font-weight: 700; color: var(--text-sub); }
  .ds-grid { display: grid; grid-template-columns: repeat(4, auto); gap: 8px 26px; }
  .ds-grid > div { display: flex; flex-direction: column; gap: 2px; }
  .ds-k { font-size: 11.5px; color: var(--text-dim); }
  .ds-v { font-size: 15px; font-weight: 800; color: var(--text); }
  .ds-summary { margin-top: 14px; font-size: 13px; color: var(--text); background: #F6F8FB; border-radius: 8px; padding: 10px 12px; }
  .det-ct { font-size: 14px; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .det-hint { font-size: 11.5px; font-weight: 600; color: var(--text-dim); }
  .det-report, .det-reply, .det-history { padding: 18px 20px; margin-bottom: 14px; }

  /* 상단 2단: 좌 공업사 청구견적 / 우 판단기준 Score */
  .det-mid { display: grid; grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr); gap: 14px; margin-bottom: 14px; align-items: start; }
  .det-mid .cmp-col { padding: 16px 18px; }
  .score-col .cri-list { margin-top: 2px; }

  /* 판단기준 막대 */
  .cri-row { padding: 9px 0; border-bottom: 1px dashed var(--line); }
  .cri-row:last-child { border-bottom: 0; }
  .cri-row.has-reason { cursor: pointer; }
  .cri-top { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 6px; }
  .cri-name { font-weight: 700; color: var(--text); }
  .cri-caret { font-size: 10px; color: var(--text-dim); transition: transform .15s; display: inline-block; }
  .cri-row.open .cri-caret { transform: rotate(180deg); }
  .cri-score { font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text-sub); }
  .cri-bar { height: 8px; background: #EEF1F6; border-radius: 5px; overflow: hidden; }
  .cri-fill { height: 100%; background: #22C55E; border-radius: 5px; transition: width .8s cubic-bezier(.4,0,.2,1); }
  .cri-fill.low { background: #F59E0B; }
  .cri-reason { display: none; margin-top: 8px; font-size: 12.5px; color: var(--text-sub); background: #FFF7ED; border-left: 3px solid #F59E0B; border-radius: 0 6px 6px 0; padding: 8px 10px; }
  .cri-row.open .cri-reason { display: block; }

  /* 사진·견적 비교 */
  .det-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .cmp-col { padding: 16px 18px; }
  .cmp-t { font-size: 13.5px; font-weight: 800; margin-bottom: 12px; }
  .ph-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .ph-card { margin: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
  .ph-card img { width: 100%; height: 76px; object-fit: cover; display: block; }
  .ph-ph { height: 76px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 12px; background: #F1F4F9; }
  .ph-card figcaption { font-size: 10.5px; color: var(--text-sub); padding: 4px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* 공업사 청구견적 테이블 */
  .et-scroll { overflow-x: auto; }
  .et-table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
  .et-table th { background: #F5F8FC; text-align: left; padding: 7px 8px; font-weight: 700; color: var(--text-sub); border-bottom: 1px solid var(--line); }
  .et-table th.num, .et-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .et-table td { padding: 7px 8px; border-bottom: 1px solid var(--line); }
  .et-table .et-g { color: var(--text-sub); }
  .et-table .et-name { font-weight: 700; color: var(--text); white-space: normal; }
  .et-table .et-m { color: var(--text-sub); }
  .et-table tr.row-excl td:not(.et-st) { color: var(--text-dim); text-decoration: line-through; text-decoration-color: #D4B0B0; }
  .et-table tfoot td { border-top: 1.5px solid var(--line-strong); border-bottom: 0; font-weight: 700; color: var(--text-sub); padding: 8px; }
  .et-table tfoot td.tot { color: var(--text); font-weight: 800; }
  .et-exclnote { margin-top: 10px; font-size: 12px; color: var(--text-sub); background: #FFF7ED; border-radius: 8px; padding: 8px 10px; }
  .et-exclnote b.red { color: var(--red); font-weight: 800; }
  .item-st { display: inline-flex; padding: 1px 7px; border-radius: 5px; font-size: 10.5px; font-weight: 800; }
  .item-st.st-ok { color: var(--green); background: var(--green-soft); }
  .item-st.st-no { color: var(--red); background: var(--red-soft); }
  .item-st.st-cond { color: #B45309; background: #FEF3C7; }

  /* AI 인정금액 산정 (손해사정 판정) */
  .adj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .adj-cell { border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }
  .adj-cell span { font-size: 11.5px; color: var(--text-sub); }
  .adj-cell b { font-size: 16px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
  .adj-cell b.red { color: var(--red); }
  .adj-cell.hl { border-color: var(--blue-line); background: var(--blue-soft); }
  .adj-cell.hl b { color: var(--blue-dark); }
  .adj-diff { font-size: 12.5px; color: var(--text-sub); margin-bottom: 12px; }
  .adj-diff b { color: var(--text); font-weight: 800; }
  .adj-sub { font-size: 12px; font-weight: 800; color: var(--text-sub); margin-bottom: 8px; }
  .adj-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .adj-list li { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
  .adj-h { display: flex; align-items: center; gap: 6px; font-size: 12.5px; }
  .adj-h b { font-weight: 700; color: var(--text); }
  .adj-tag { display: inline-flex; padding: 1px 6px; border-radius: 5px; font-size: 10.5px; font-weight: 800; }
  .adj-tag.no { color: var(--red); background: var(--red-soft); }
  .adj-tag.cond { color: #B45309; background: #FEF3C7; }
  .adj-amt { margin-left: auto; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text); }
  .adj-amt.red { color: var(--red); }
  .adj-reason { font-size: 11.5px; color: var(--text-sub); margin-top: 4px; line-height: 1.5; }
  .adj-ok { font-size: 12.5px; color: var(--green); background: var(--green-soft); border-radius: 8px; padding: 10px 12px; font-weight: 700; }
  .adj-note { margin-top: 12px; font-size: 11px; color: var(--text-dim); line-height: 1.5; }
  .adj-note b { color: var(--text-sub); font-weight: 700; }
  .ai-nodata { font-size: 12.5px; color: var(--text-dim); padding: 20px 0; text-align: center; }

  /* AI 레포트 */
  .rep-verdict { font-size: 13.5px; font-weight: 700; color: var(--text); background: #F6F8FB; border-radius: 8px; padding: 11px 13px; margin-bottom: 14px; }
  .rep-cols { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .rep-block .rep-t { font-size: 12.5px; font-weight: 800; color: var(--text-sub); margin-bottom: 6px; }
  .rep-block .rep-t.warn { color: var(--red); }
  .rep-block .rep-t.rec { color: var(--blue-dark); }
  .rep-block ul { margin: 0; padding-left: 16px; font-size: 12.5px; line-height: 1.65; color: var(--text); }

  /* 검토회신 */
  .det-reply textarea { width: 100%; border: 1px solid var(--line-strong); border-radius: 9px; padding: 12px; font-size: 13px; line-height: 1.6; font-family: inherit; color: var(--text); resize: vertical; }
  .det-reply textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
  .reply-final { font-size: 13px; line-height: 1.65; color: var(--text); background: #F6F8FB; border-radius: 8px; padding: 12px 14px; }

  /* 액션 버튼 — 상세화면 하단 액션 바 */
  .det-actions { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; margin: 0 0 14px; padding: 14px 16px; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
  .da-btn { padding: 10px 20px; border-radius: 9px; border: 1px solid var(--line-strong); background: #fff; font-size: 13px; font-weight: 800; color: var(--text-sub); cursor: pointer; }
  .da-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .da-btn.edit { border-color: var(--blue-line); color: var(--blue-dark); background: var(--blue-soft); }
  .da-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .da-btn.primary:hover { background: var(--blue-dark); }
  .da-done { font-size: 13px; font-weight: 800; color: var(--green); background: var(--green-soft); border-radius: 9px; padding: 11px 18px; }

  /* 이력 */
  .hist-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .hist-table th { background: #F5F8FC; text-align: left; padding: 8px 10px; font-weight: 700; color: var(--text-sub); border-bottom: 1px solid var(--line); }
  .hist-table td { padding: 8px 10px; border-bottom: 1px solid var(--line); color: var(--text); }
  .hist-before { color: var(--text-dim); }

  /* 검토요청 모달 */
  .ai-modal .req-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ai-modal .req-field { display: flex; flex-direction: column; gap: 5px; }
  .ai-modal .req-field.full { grid-column: 1 / -1; }
  .ai-modal .req-field .k { font-size: 12px; font-weight: 700; color: var(--text-sub); }
  .ai-modal .req-field input, .ai-modal .req-field select, .ai-modal .req-field textarea { padding: 8px 11px; border: 1px solid var(--line-strong); border-radius: 8px; font-size: 13px; font-family: inherit; color: var(--text); background: #fff; }
  .ai-modal .req-field input[readonly] { background: #F6F8FB; color: var(--text-sub); }
  .have-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .have-chip { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
  .have-chip.on { color: var(--green); background: var(--green-soft); }
  .have-chip.off { color: var(--text-dim); background: #EEF1F6; }

  /* 분석 진행 애니메이션 */
  .prog-wrap { padding: 6px 2px; }
  .prog-bar { height: 8px; background: #EEF1F6; border-radius: 5px; overflow: hidden; }
  .prog-fill { height: 100%; width: 0; background: linear-gradient(90deg, #3B82F6, #2563EB); border-radius: 5px; transition: width .5s ease; }
  .prog-pct { text-align: right; font-size: 12px; font-weight: 800; color: var(--blue-dark); margin: 6px 2px 14px; font-variant-numeric: tabular-nums; }
  .prog-steps { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  .prog-step { display: flex; align-items: center; gap: 12px; font-size: 13.5px; color: var(--text-dim); }
  .prog-step .ps-ic { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--line-strong); flex: none; position: relative; transition: all .2s; }
  .prog-step.doing { color: var(--text); font-weight: 700; }
  .prog-step.doing .ps-ic { border-color: var(--blue); border-top-color: transparent; animation: ai-spin .7s linear infinite; }
  .prog-step.done { color: var(--text-sub); }
  .prog-step.done .ps-ic { border-color: #22C55E; background: #22C55E; }
  .prog-step.done .ps-ic::after { content: ""; position: absolute; left: 5px; top: 2px; width: 5px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  @keyframes ai-spin { to { transform: rotate(360deg); } }
  .prog-note { margin-top: 16px; font-size: 11.5px; color: var(--text-dim); }
  .prog-result { margin-top: 18px; padding: 16px; background: #F6F8FB; border-radius: 10px; text-align: center; }
  .pr-title { font-size: 14px; font-weight: 800; color: var(--green); }
  .pr-score { font-size: 15px; font-weight: 700; margin-top: 6px; }
  .pr-score b { font-size: 20px; font-weight: 800; color: var(--blue-dark); }
  .pr-sub { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

  @media (max-width: 1100px) {
    .ai-work { flex-direction: column; }
    .ai-side { width: 100%; position: static; max-height: none; }
    .ai-side .dw-body { max-height: 60vh; }
  }
  @media (max-width: 900px) {

  }
