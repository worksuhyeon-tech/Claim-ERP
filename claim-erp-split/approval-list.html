<header class="topbar">
  <div class="tb-left">
    <div class="brand-tag" id="viewName">결재 LIST</div>
  </div>
  <div class="topbar-right">
    <button type="button" class="btn-req" id="btnRequest">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14M5 17a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h9l5 4v5a2 2 0 0 1-2 2"/><circle cx="7.5" cy="17.5" r="1.6"/><circle cx="16.5" cy="17.5" r="1.6"/></svg>
      대차/탑승 신청
    </button>
    <span id="todayLabel"></span>
    <div class="user-chip">
      <div class="avatar">박</div>
      <span><b>박지현</b> 매니저 · Claim운영1팀</span>
    </div>
  </div>
</header>

<main class="container">

  <section id="viewClosing" class="view">
    <section class="page-head">
      <h1>결재 LIST</h1>
      <p>추산·지급(종결)·면책종결·추가지급·VOC 결재 건을 조회하고, 건을 선택해 우측 Speed결재 패널에서 바로 승인·반려합니다.</p>
    </section>

    <section class="card appr-toolbar">
      <div class="appr-field">
        <label for="apprSearch">담당자 · 사고번호</label>
        <div class="appr-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
          <input type="search" id="apprSearch" autocomplete="off" placeholder="담당자명 또는 사고번호 검색" aria-label="담당자·사고번호 검색" />
        </div>
      </div>
      <div class="appr-field">
        <label for="apprType">결재종류</label>
        <select id="apprType">
          <option value="전체">전체</option>
          <option value="추산">추산</option>
          <option value="지급(종결)">지급(종결)</option>
          <option value="면책종결">면책종결</option>
          <option value="추가지급">추가지급</option>
          <option value="VOC">VOC</option>
        </select>
      </div>
      <div class="appr-field">
        <label for="apprStatus">결재상태</label>
        <select id="apprStatus">
          <option value="전체">전체</option>
          <option value="상신중">상신중</option>
          <option value="결재완료">결재완료</option>
          <option value="반려">반려</option>
          <option value="상신취소">상신취소</option>
        </select>
      </div>
      <div class="appr-field appr-daterange">
        <label>조회기간 (결재완료일)</label>
        <div class="appr-dates">
          <input type="date" id="apprFrom" aria-label="조회 시작일" />
          <span class="appr-dash">~</span>
          <input type="date" id="apprTo" aria-label="조회 종료일" />
        </div>
      </div>
      <div class="appr-actions sa-actions">
        <button type="button" class="btn" id="apprSearchBtn">검색</button>
        <button type="button" class="btn" id="apprReset">초기화</button>
      </div>
    </section>

    <section class="appr-cards appr-cards6" id="apprCards"></section>

    <div class="sa-workspace">
      <section class="list-card card sa-grid-card">
        <div class="list-head">
          <h2 id="apprListTitle">전체 결재 건</h2>
          <span class="count" id="apprCount"></span>
          <span class="hint">요약카드를 클릭하면 해당 결재종류만 표시됩니다. 행을 클릭하면 우측 Speed결재 패널이 열립니다.</span>
        </div>
        <div class="sa-grid-wrap"><div id="apprRows"></div></div>
      </section>
      <aside class="panel card" id="apprPanel"></aside>
    </div>
  </section><!-- /#viewClosing -->

</main>
