<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart업무처리 | CLAIM ERP</title>
<link rel="stylesheet" href="common.css" />
<link rel="stylesheet" href="intake-ocr.css" />
<style>
  /* 사고 접수 목록 (조회구분 ↔ 상세 사이, 항상 3줄) */
  #viewIntake .lg-list { border: 1px solid var(--lg-line2, #C9D3E4); border-radius: 5px; background: #fff; margin-bottom: 8px; overflow: hidden; }
  #viewIntake .lg-list-head { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: #F4F7FC; border-bottom: 1px solid var(--lg-line, #D9E0EC); font-size: 12px; font-weight: 800; color: #2B3140; }
  #viewIntake .lg-list-head .cnt { color: #2F5FBF; font-weight: 700; }
  #viewIntake .lg-list-tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
  #viewIntake .lg-list-tbl th, #viewIntake .lg-list-tbl td { border-bottom: 1px solid var(--lg-line, #EEF1F6); padding: 5px 8px; font-size: 11.5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #viewIntake .lg-list-tbl th { background: var(--lg-label, #EEF2F8); color: #3A3F4E; font-weight: 700; }
  #viewIntake .lg-list-tbl td.c-id { color: #2F5FBF; font-weight: 700; }
  #viewIntake .lg-lrow { cursor: pointer; }
  #viewIntake .lg-lrow:hover { background: #F1F6FF; }
  #viewIntake .lg-lrow.on { background: #E7F0FF; }
  #viewIntake .lg-lrow.on td { font-weight: 700; }
  #viewIntake .lg-lrow.empty, #viewIntake .lg-lrow.empty:hover { cursor: default; background: transparent; }
  #viewIntake .lg-lrow.empty td { color: transparent; }
  #viewIntake .lg-lstat { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 700; background: #EEF1F6; color: #5B6273; }
  #viewIntake .lg-lstat.s-todo { background: #FDECEC; color: #D14343; }
  #viewIntake .lg-lstat.s-doing { background: #E7F0FF; color: #2F5FBF; }
  #viewIntake .lg-lstat.s-done { background: #E7F7EE; color: #1E8E5A; }
  #viewIntake .lg-lstat.s-hold { background: #FFF4E5; color: #B4690E; }
  #viewIntake .lg-list-pager { display: flex; gap: 4px; justify-content: center; padding: 6px; background: #FAFBFD; border-top: 1px solid var(--lg-line, #EEF1F6); }
  #viewIntake .lg-lpg { min-width: 24px; height: 24px; border: 1px solid var(--lg-line2, #C9D3E4); background: #fff; border-radius: 4px; font-size: 11.5px; font-weight: 700; color: #3C4050; cursor: pointer; }
  #viewIntake .lg-lpg.on { background: #2F5FBF; color: #fff; border-color: #2F5FBF; }

  /* 상단 행 — 좌: 요약(좁게) / 우: SK렌터카 연동 정보 (요약 오른쪽 빈 공간 채움) */
  #viewIntake .lg-toprow { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 8px; }
  #viewIntake .lg-toprow-sum { flex: 0 0 440px; max-width: 46%; }
  #viewIntake .lg-toprow-sk { flex: 1 1 0; min-width: 0; }
  #viewIntake .lg-toprow-sk .lg-sect { margin-top: 0; }
  /* SK렌터카 연동 정보 — 우측 폭에 맞춘 가로 표 (헤더 2줄 허용) */
  #viewIntake .lg-sk-band { width: 100%; min-width: 0; table-layout: fixed; }
  #viewIntake .lg-sk-band th { white-space: normal; word-break: keep-all; font-size: 11.5px; padding: 4px; }
  #viewIntake .lg-sk-band td { text-align: center; font-size: 11.5px; }
  #viewIntake .lg-sk-band td[data-desc],
  #viewIntake .lg-sect[data-desc] { cursor: help; }

  /* 차량 부위 손상 — 정비공장 입력 ↔ 담당자 입력 2단 대조 */
  #viewIntake .lg-dmg-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  #viewIntake .lg-dmg-col { border: 1px solid var(--lg-line2, #C9D3E4); border-radius: 5px; background: #fff; padding: 8px 10px 10px; }
  #viewIntake .lg-dmg-col .lg-dmg { border: 0; padding: 0; }
  #viewIntake .lg-dmg-cap {
    display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
    font-size: 12.5px; font-weight: 800; color: #2B3140;
    padding-bottom: 7px; margin-bottom: 9px; border-bottom: 1px dashed var(--lg-line, #D9E0EC);
  }
  #viewIntake .lg-dmg-cap span { font-size: 11px; font-weight: 600; color: #8A90A0; }
  #viewIntake .lg-dmg-cap::before { content: ""; width: 9px; height: 9px; border-radius: 2px; flex: none; }
  #viewIntake .lg-dmg-cap.shop::before { background: #6B7280; }
  #viewIntake .lg-dmg-cap.shop { color: #384150; }
  #viewIntake .lg-dmg-cap.staff::before { background: #B45309; }
  #viewIntake .lg-dmg-cap.staff { color: #B45309; }
  /* 담당자 입력 항목은 클릭으로 선택 */
  #viewIntake .lg-dmg-item.staff-part { cursor: pointer; user-select: none; border-radius: 3px; }
  #viewIntake .lg-dmg-item.staff-part:hover { background: #FEF3C7; }
  #viewIntake .lg-dmg-item.staff-part.on { color: #B45309; }
  #viewIntake .lg-dmg-item.staff-part.on .b { background: #B45309; border-color: #B45309; }

  /* 진행 이력 채널(구분) 필터 라디오 */
  #viewIntake .lg-hist-filter { font-size: 11.5px; gap: 8px; }

  /* 미결 속성 — 항목(체크박스) + 입력필드 2열 */
  #viewIntake .lg-attrs2 { display: grid; grid-template-columns: auto 1fr; gap: 6px 8px; align-items: center; margin-bottom: 8px; }
  #viewIntake .lg-attr2 { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--lg-line2, #C9D3E4); border-radius: 4px; padding: 5px 9px; font-size: 11.5px; font-weight: 700; color: #3C4050; background: #fff; white-space: nowrap; cursor: pointer; }
  #viewIntake .lg-attr2 input[type="checkbox"] { accent-color: var(--lg-blue, #2F5FBF); margin: 0; }
  #viewIntake .lg-attr2:has(input:checked) { color: var(--lg-blue, #2F5FBF); border-color: #9FB6DE; background: #EEF3FB; }
  #viewIntake .lg-attr2 .nm.muted { color: #8A90A0; font-weight: 600; }
  #viewIntake .lg-attr-fw { min-width: 0; }
  #viewIntake .lg-attr-field { width: 100%; box-sizing: border-box; border: 1px solid var(--lg-line2, #C9D3E4); border-radius: 4px; padding: 5px 8px; font-size: 11.5px; color: #242832; background: #fff; }
  #viewIntake .lg-attr-field:focus { outline: none; border-color: var(--lg-blue, #2F5FBF); box-shadow: 0 0 0 2px rgba(47,95,191,.15); }
  #viewIntake .lg-attr-div { grid-column: 1 / -1; border-top: 1px dashed var(--lg-line, #D9E0EC); margin: 2px 0; }

  @media (max-width: 900px) {
    #viewIntake .lg-dmg-pair { grid-template-columns: 1fr; }
    #viewIntake .lg-toprow { flex-direction: column; }
    #viewIntake .lg-toprow-sum { flex-basis: auto; max-width: none; width: 100%; }
  }

  /* --- 기능 설명 툴팁 (버튼 hover 시 노출) --- */
  #clTooltip {
    position: fixed; z-index: 9999; max-width: 300px;
    background: #1B2430; color: #fff;
    font-size: 11.5px; font-weight: 500; line-height: 1.55;
    padding: 8px 11px; border-radius: 9px;
    box-shadow: 0 8px 22px rgba(16, 30, 54, .3);
    pointer-events: none; opacity: 0; transform: translateY(4px);
    transition: opacity .12s ease, transform .12s ease;
    white-space: normal; word-break: keep-all;
  }
  #clTooltip.show { opacity: 1; transform: translateY(0); }
  #clTooltip::after {
    content: ""; position: absolute; left: var(--tip-arrow, 50%);
    width: 9px; height: 9px; background: #1B2430;
    transform: translateX(-50%) rotate(45deg);
  }
  #clTooltip.above::after { bottom: -4px; }
  #clTooltip.below::after { top: -4px; }
  /* hover 시 설명 대상임을 은근히 안내 */
  #viewIntake [data-desc] { cursor: pointer; }
  #viewIntake input[type="text"][data-desc],
  #viewIntake input[type="date"][data-desc],
  #viewIntake textarea[data-desc],
  #viewIntake .lg-input[data-desc],
  #viewIntake .lg-in[data-desc],
  #viewIntake .lg-ta[data-desc] { cursor: text; }

  /* ===== 계약 사고 정보 탭 — 담당자 편집 컨트롤 ===== */
  .lg-cin, .lg-csel { width: 100%; box-sizing: border-box; border: 1px solid #C9D0DE; border-radius: 5px;
    padding: 3px 7px; font-size: 12px; color: #242832; background: #fff; font-family: inherit; }
  .lg-cin.sm { width: auto; min-width: 130px; }
  .lg-csel { cursor: pointer; }
  .lg-cin:focus, .lg-csel:focus { outline: none; border-color: #2F5BB7; box-shadow: 0 0 0 2px rgba(47,91,183,.15); }
  .lg-tbl td:has(> .lg-cin), .lg-tbl td:has(> .lg-csel) { padding: 3px 6px; }
  /* 생년월일 3분할 — 주민번호 앞자리 / 뒷자리 첫1자리 / 만 나이(자동계산·비활성) */
  .lg-birth { display: flex; align-items: center; gap: 4px 6px; flex-wrap: wrap; }
  .lg-birth .lg-birth-front { width: 82px; text-align: center; letter-spacing: .5px; }
  .lg-birth .lg-birth-back { width: 30px; text-align: center; }
  .lg-birth-sep { color: #9AA0B0; }
  .lg-birth-mask { letter-spacing: 2px; color: #B9C0CE; font-size: 11px; user-select: none; }
  .lg-birth-age { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #3A3F4E; white-space: nowrap; margin-left: 2px; }
  .lg-birth .lg-birth-ageval { width: 42px; text-align: center; background: #EEF1F6; color: #242832; font-weight: 700; cursor: default; -webkit-text-fill-color: #242832; opacity: 1; }
  /* 조사 Task 체크박스 */
  .lg-ctchecks { display: flex; flex-wrap: wrap; gap: 4px 12px; }
  .lg-ctchk { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #3A3F4E; cursor: pointer; }
  .lg-ctchk input { width: 13px; height: 13px; accent-color: #2F5BB7; cursor: pointer; }
  /* 시스템 자동판단 조사 Task */
  .lg-ctchk.auto { cursor: default; color: #5B6273; }
  .lg-ctchk.auto input { cursor: default; }
  .lg-ctauto { font-size: 9.5px; font-weight: 800; color: #2F5BB7; background: #EAF0FB; border: 1px solid #C6D7F2; border-radius: 4px; padding: 0 4px; margin-left: 1px; }
  /* 경찰접수 라디오 */
  .lg-ctpolice { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .lg-ctradio { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #3A3F4E; cursor: pointer; }
  .lg-ctradio input { accent-color: #2F5BB7; cursor: pointer; }
  .lg-ctstation { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 6px 14px; font-size: 12px; color: #5B6273; }
  .lg-ctstation-i { display: inline-flex; align-items: center; gap: 6px; }
  .lg-hide { display: none !important; }
  /* 섹션 헤더 내 조회 버튼 */
  .lg-sect .lg-mini { float: right; margin-top: -2px; }
  .lg-ctype.disabled { opacity: .45; cursor: default; }

  /* Moral 사고 조사 팝업 */
  .ct-modal-root { position: fixed; inset: 0; z-index: 9500; display: none; }
  .ct-modal-root.open { display: block; }
  .ct-modal-bd { position: absolute; inset: 0; background: rgba(16,24,40,.4); }
  .ct-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 460px; max-width: 92vw; background: #fff; border-radius: 12px; box-shadow: 0 20px 50px rgba(16,30,54,.3); overflow: hidden; }
  .ct-modal-h { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #E6EAF2; font-size: 15px; }
  .ct-modal-x { border: 0; background: #F1F4F9; width: 28px; height: 28px; border-radius: 8px; font-size: 18px; color: #5B6273; cursor: pointer; }
  .ct-modal-b { padding: 16px 18px; }
  .ct-modal-guide { margin: 0 0 10px; font-size: 12.5px; color: #B45309; background: #FEF3C7; border-radius: 8px; padding: 9px 11px; }
  .ct-modal-b textarea { width: 100%; box-sizing: border-box; border: 1px solid #C9D0DE; border-radius: 8px; padding: 10px; font-size: 13px; line-height: 1.6; font-family: inherit; resize: vertical; }
  .ct-modal-b textarea:focus { outline: none; border-color: #2F5BB7; box-shadow: 0 0 0 3px rgba(47,91,183,.15); }
  .ct-modal-f { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 18px 16px; }

  /* 개인정보동의 옆 알림톡·문자 발송 아이콘 */
  .lg-agree { display: inline-flex; align-items: center; gap: 8px; }
  .lg-agree-v { color: #242832; }
  .lg-msgbtn { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 24px;
    border: 1px solid #C6D7F2; border-radius: 6px; background: #EAF0FB; color: #2F5BB7; cursor: pointer; flex: none; padding: 0; }
  .lg-msgbtn:hover { background: #DCE7FA; border-color: #2F5BB7; }
  .lg-msgbtn svg { width: 15px; height: 15px; }

  /* ===== 피해 진행 정보 탭 — 편집 컨트롤 ===== */
  .lg-cin.ta-r { text-align: right; }
  .lg-skval { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; color: #242832; }
  .lg-sktag { font-size: 10px; font-weight: 800; color: #2F5BB7; background: #EAF0FB; border: 1px solid #C6D7F2; border-radius: 4px; padding: 0 5px; }
  .lg-cinhint { font-size: 11px; color: #9AA0B0; margin-left: 6px; }
  .lg-savetag { font-size: 11.5px; font-weight: 800; padding: 3px 10px; border-radius: 999px; color: #8A90A0; background: #EEF1F6; border: 1px solid #DFE3EC; }
  .lg-savetag.on { color: #15803D; background: #DCFCE7; border-color: #A7E9BF; }
  .lg-shopfield { display: flex; align-items: center; gap: 8px; }
  .lg-shopph { color: #2F5BB7; font-weight: 700; }
  .lg-shopbtn { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 24px; border: 1px solid #C9D0DE; border-radius: 6px; background: #F5F8FC; color: #2F5BB7; cursor: pointer; flex: none; }
  .lg-shopbtn:hover { background: #E7EFFB; border-color: #2F5BB7; }
  .lg-estwrap { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .lg-estwrap .lg-cin { width: 150px; }
  .lg-estunit { color: #5B6273; font-size: 12px; }
  .lg-estvat { color: #5B6273; font-size: 12px; }
  .lg-estvat b { color: #2F5BB7; font-variant-numeric: tabular-nums; }
  /* 공업사 검색 리스트 */
  .lg-shoplist { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .lg-shopitem { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 12px; border: 1px solid #E6EAF2; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; }
  .lg-shopitem:hover { border-color: #2F5BB7; background: #F5F8FC; }
  .lg-shopitem .nm { font-size: 13px; font-weight: 700; color: #242832; }
  .lg-shopitem .ph { font-size: 12px; color: #2F5BB7; font-weight: 700; }
  .lg-shopempty { text-align: center; color: #9AA0B0; font-size: 13px; padding: 24px 0; }
</style>
</head>
