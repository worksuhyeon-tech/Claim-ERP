  <div class="app-main">

<header class="topbar">
  <div class="tb-left">
    <div class="brand-tag" id="viewName">이미지 시스템</div>
  </div>
  <div class="topbar-right">
    <button type="button" class="btn-req" id="btnRequest">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14M5 17a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h9l5 4v5a2 2 0 0 1-2 2"/><circle cx="7.5" cy="17.5" r="1.6"/><circle cx="16.5" cy="17.5" r="1.6"/></svg>
      대차/탑승 신청
    </button>
    <span id="todayLabel"></span>
    <div class="user-chip">
      <div class="avatar">박</div>
      <span><b>박지현</b> 매니저 · Claim운영1팀</span>
    </div>
  </div>
</header>

<main class="container">

  <section id="viewImages" class="view">

    <section class="page-head">
      <h1>이미지 시스템</h1>
      <p>사고건별 사진·서류를 폴더로 관리하고, 고객이 요청하면 바로 문자로 발송하세요.</p>
    </section>

    <section class="img-layout">
      <aside class="img-claims card" aria-label="사고건 선택">
        <div class="img-claims-head">
          <div class="list-search img-claim-search">
            <svg class="ls-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
            <input type="search" id="imgSearchInput" autocomplete="off" placeholder="사고번호·고객·차량 검색" aria-label="사고건 검색" />
            <button type="button" id="imgSearchClear" class="ls-clear" aria-label="검색어 지우기" hidden>×</button>
          </div>
        </div>
        <div class="img-claim-list" id="imgClaimList"></div>
      </aside>

      <section class="img-main card" id="imgMain" aria-label="이미지 폴더"></section>
    </section>

  </section><!-- /#viewImages -->

</main>
