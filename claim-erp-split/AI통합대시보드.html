<style>

  * { box-sizing:border-box; margin:0; padding:0; }
  body { min-height:100vh; background:var(--bg); color:var(--text); font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",system-ui,sans-serif; font-size:14px; line-height:1.5; }

  .topbar { height:56px; background:#fff; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; padding:0 28px; position:sticky; top:0; z-index:10; }
  .brand { display:flex; align-items:center; gap:10px; font-weight:900; }
  .brand-mark { width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,#3B82F6,#1D4ED8); color:#fff; display:grid; place-items:center; box-shadow:0 2px 6px rgba(37,99,235,.35); }

  .hero-head { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:16px; }
  .hero h2 { font-size:20px; font-weight:900; letter-spacing:-.3px; }
  .hero p { color:#C7D2FE; margin-top:4px; }
  .pro-chip { font-size:11px; font-weight:900; color:#1E3A8A; background:#DBEAFE; border-radius:99px; padding:3px 9px; white-space:nowrap; }
  .summary { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; }
  .summary-card { border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.08); color:#fff; border-radius:14px; padding:14px; text-align:left; cursor:pointer; transition:.14s ease; }
  .summary-card:hover, .summary-card.active { background:rgba(255,255,255,.16); border-color:rgba(255,255,255,.42); transform:translateY(-1px); }

  .summary-card .v { font-size:28px; font-weight:900; margin-top:6px; line-height:1; }
  .summary-card .v small { font-size:13px; margin-left:3px; color:#DDE7FF; }
  .summary-card .d { font-size:12px; color:#DDE7FF; margin-top:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); }
  .toolbar { padding:16px; margin-bottom:14px; display:grid; grid-template-columns:150px minmax(180px,1fr) repeat(4,150px) auto; gap:10px; align-items:end; }
  .field { display:flex; flex-direction:column; gap:5px; min-width:0; }
  .field label { font-size:11.5px; font-weight:800; color:var(--text-dim); }
  .field input, .field select { width:100%; border:1px solid var(--line-strong); border-radius:9px; padding:8px 10px; background:#fff; color:var(--text); }
  .field input:focus, .field select:focus, .reply:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-soft); }
  .btn { border:1px solid var(--line-strong); background:#fff; color:var(--text-sub); border-radius:10px; padding:9px 12px; cursor:pointer; font-weight:800; }
  .btn:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-soft); }
  .btn.primary { background:var(--blue); border-color:var(--blue); color:#fff; box-shadow:0 2px 8px rgba(37,99,235,.3); }
  .layout { display:grid; grid-template-columns:minmax(0,1.1fr) 430px; gap:16px; align-items:start; }
  .list-head, .detail-head { padding:15px 18px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:12px; align-items:center; }
  .list-head h2, .detail-head h2 { font-size:16px; font-weight:900; }
  .count { color:var(--text-dim); font-size:13px; }
  .table-wrap { overflow:auto; max-height:650px; }
  table { width:100%; border-collapse:collapse; table-layout:fixed; }
  th, td { border-bottom:1px solid #EEF2F7; padding:10px 9px; font-size:12.5px; text-align:left; vertical-align:middle; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  th { position:sticky; top:0; background:#F8FAFD; z-index:1; color:var(--text-dim); font-size:11px; font-weight:900; }
  tbody tr { cursor:pointer; }
  tbody tr:hover td, tbody tr.active td { background:var(--blue-soft); }
  .cid { color:var(--blue-dark); font-weight:900; font-variant-numeric:tabular-nums; }
  .score { display:inline-flex; min-width:54px; justify-content:center; border-radius:99px; padding:4px 8px; font-weight:900; background:#EEF2FF; color:#3730A3; }
  .score.wait { background:#F1F5F9; color:#64748B; } .score.bad { background:var(--red-soft); color:var(--red); } .score.mid { background:var(--amber-soft); color:var(--amber); } .score.good { background:var(--green-soft); color:var(--green); }
  .badge { display:inline-flex; border-radius:99px; padding:4px 9px; font-size:11.5px; font-weight:900; background:#F1F5F9; color:#475569; }
  .badge.ok { background:var(--green-soft); color:var(--green); } .badge.cond { background:#E0F2FE; color:#0369A1; } .badge.hold { background:var(--amber-soft); color:var(--amber); } .badge.fail, .badge.reject { background:var(--red-soft); color:var(--red); }

  .detail-body { padding:16px 18px; display:grid; gap:14px; }
  .score-row { display:grid; grid-template-columns:128px 1fr; gap:14px; align-items:center; }
  .donut { --p:0; width:116px; height:116px; border-radius:50%; background:conic-gradient(var(--blue) calc(var(--p) * 1%),#E6EAF2 0); display:grid; place-items:center; }
  .donut::after { content:attr(data-label); width:78px; height:78px; border-radius:50%; background:#fff; display:grid; place-items:center; font-size:20px; font-weight:900; color:var(--text); }
  .facts { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .fact { background:#F8FAFD; border:1px solid var(--line); border-radius:10px; padding:9px; }
  .fact .k { color:var(--text-dim); font-size:11px; font-weight:800; } .fact .v { margin-top:2px; font-weight:900; }
  .section-title { font-size:12px; font-weight:900; color:var(--text-dim); letter-spacing:.3px; margin-bottom:8px; }
  .criteria { display:grid; gap:8px; }
  .criterion { border:1px solid var(--line); border-radius:10px; padding:9px; background:#fff; }

  .criterion-bar { height:7px; background:#EEF2F7; border-radius:99px; margin-top:7px; overflow:hidden; }
  .criterion-bar span { display:block; height:100%; background:var(--blue); border-radius:inherit; }
  .criterion-reason { margin-top:7px; color:var(--text-sub); font-size:12px; line-height:1.45; }
  .compare { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .pane { border:1px solid var(--line); border-radius:12px; padding:11px; background:#FBFCFE; min-height:128px; }
  .pane h3 { font-size:12px; color:var(--text-dim); margin-bottom:8px; }
  .pane li { list-style:none; padding:5px 0; font-size:12.5px; border-bottom:1px dashed #E5EAF3; }
  .report { background:#F8FAFD; border:1px solid var(--line); border-radius:12px; padding:12px; color:var(--text-sub); line-height:1.6; }
  .reply { width:100%; min-height:96px; resize:vertical; border:1px solid var(--line-strong); border-radius:10px; padding:10px; font-size:13px; }
  .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .history { display:grid; gap:7px; color:var(--text-sub); font-size:12px; }
  .history div { border-left:3px solid var(--blue-line); padding-left:9px; }
  .empty { padding:40px; text-align:center; color:var(--text-dim); }
  .toast-wrap { position:fixed; right:22px; bottom:22px; display:grid; gap:8px; z-index:50; }
  .toast { background:#1B2430; color:#fff; border-radius:12px; padding:11px 14px; box-shadow:0 10px 28px rgba(15,23,42,.24); font-weight:700; animation:toast-in .2s ease; }

</style>

const $ = selector => document.querySelector(selector);
let selectedSummary = "all";
let selectedId = reviewItems[0].id;
const filters = { q:"", stage:"전체", decision:"전체", score:"전체", confidence:"전체" };
function escapeHtml(value) { return String(value ?? "").replace(/[&<>'"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch])); }
function scoreClass(item) { if (item.score == null) return "wait"; if (item.score >= 85) return "good"; if (item.score >= 70) return "mid"; if (item.score < 50) return "bad"; return "mid"; }
function decisionClass(decision) { if (decision === "적정") return "ok"; if (decision === "조건부 적정") return "cond"; if (decision === "보류" || decision.includes("대기")) return "hold"; if (decision === "분석실패") return "fail"; if (decision === "부적정") return "reject"; return ""; }
function matchesScore(item) { const s = item.score; if (filters.score === "점수 미산출") return s == null; if (filters.score === "85점 이상") return s >= 85; if (filters.score === "70~84점") return s >= 70 && s <= 84; if (filters.score === "50~69점") return s >= 50 && s <= 69; if (filters.score === "49점 이하") return s != null && s <= 49; return true; }
function matchesConfidence(item) { const c = item.confidence; if (filters.confidence === "미산출") return c == null; if (filters.confidence === "90% 이상") return c >= 90; if (filters.confidence === "70~89%") return c >= 70 && c <= 89; if (filters.confidence === "70% 미만") return c != null && c < 70; return true; }
function matchesSummary(item) {
  if (selectedSummary === "all") return true;
  if (selectedSummary === "repairDone") return item.stage === "수리승인" && item.decision === "적정";
  if (selectedSummary === "adjustDone") return item.stage === "완료";
  return item.group === selectedSummary;
}
function filteredItems() {
  const q = filters.q.trim().toLowerCase();
  const priority = { "보류":1, "조건부 적정":2, "분석실패":3, "자료대기":4, "청구서대기":4, "AI 분석중":5, "적정":6 };
  return reviewItems.filter(item => matchesSummary(item)
    && (filters.stage === "전체" || item.stage === filters.stage)
    && (filters.decision === "전체" || item.decision === filters.decision)
    && matchesScore(item) && matchesConfidence(item)
    && (!q || [item.id,item.shop,item.carNo,item.carName].some(value => String(value).toLowerCase().includes(q))))
    .sort((a,b) => (priority[a.decision] || 9) - (priority[b.decision] || 9) || b.elapsed - a.elapsed);
}
function renderSummaryCards() {
  const cards = [
    ["all", "오늘 AI 검토대상", reviewItems.length, "신규·자료등록·재검토 포함"],
    ["repairDone", "수리승인 완료", 2, "담당자 승인 완료"],
    ["adjustDone", "손해사정 완료", 1, "최종 인정금액 확정"],
    ["waiting", "보류·대기", reviewItems.filter(item => item.group === "waiting").length, "보류 1건 · 자료대기 1건 · 분석실패 1건"]
  ];
  $("#summaryCards").innerHTML = cards.map(([key,title,count,desc]) => `<button class="summary-card ${selectedSummary === key ? "active" : ""}" type="button" data-summary="${key}"><div class="k">${title}</div><div class="v">${count}<small>건</small></div><div class="d">${desc}</div></button>`).join("");
}
function renderList() {
  const items = filteredItems();
  if (!items.some(item => item.id === selectedId)) selectedId = items[0] ? items[0].id : null;
  $("#listCount").textContent = `${items.length}건`;
  $("#reviewList").innerHTML = items.length ? `<table><colgroup><col style="width:48px"><col style="width:128px"><col style="width:120px"><col style="width:96px"><col style="width:110px"><col style="width:86px"><col style="width:86px"><col style="width:104px"><col><col style="width:68px"></colgroup><thead><tr><th>순번</th><th>접수번호</th><th>정비업체</th><th>차량번호</th><th>차량명</th><th>심사점수</th><th>단계</th><th>판정</th><th>심사내용</th><th>상세</th></tr></thead><tbody>${items.map((item,index) => `<tr class="${item.id === selectedId ? "active" : ""}" data-id="${item.id}"><td>${index + 1}</td><td><span class="cid">${item.id}</span></td><td>${item.shop}</td><td>${item.carNo}</td><td>${item.carName}</td><td><span class="score ${scoreClass(item)}">${item.score == null ? item.decision : item.score + "점"}</span></td><td><span class="badge">${item.stage}</span></td><td><span class="badge ${decisionClass(item.decision)}">${item.decision}</span></td><td title="${escapeHtml(item.summary)}">${escapeHtml(item.summary)}</td><td><button class="move" type="button">이동</button></td></tr>`).join("")}</tbody></table>` : `<div class="empty">조건에 맞는 AI 검토대상이 없습니다.</div>`;
}
function renderDetail() {
  const item = reviewItems.find(value => value.id === selectedId);
  if (!item) { $("#reviewDetail").innerHTML = `<div class="empty">목록에서 AI 심사 건을 선택하세요.</div>`; return; }
  const score = item.score == null ? 0 : item.score;
  const criteriaHtml = item.criteria.length ? item.criteria.map(([name,got,max,reason]) => `<div class="criterion"><div class="criterion-top"><span>${name}</span><b>${got} / ${max}</b></div><div class="criterion-bar"><span style="width:${Math.round(got / max * 100)}%"></span></div><div class="criterion-reason">${reason}</div></div>`).join("") : `<div class="report">심사점수 미산출 상태입니다. 부족자료 또는 실패사유를 먼저 해결해야 합니다.</div>`;
  $("#reviewDetail").innerHTML = `<div class="detail-head"><h2>${item.id} AI 심사 상세</h2><span class="badge ${decisionClass(item.decision)}">${item.decision}</span></div><div class="detail-body"><div class="score-row"><div class="donut" style="--p:${score}" data-label="${item.score == null ? "-" : item.score + "점"}"></div><div class="facts"><div class="fact"><div class="k">AI 신뢰도</div><div class="v">${item.confidence == null ? "미산출" : item.confidence + "%"}</div></div><div class="fact"><div class="k">심사단계</div><div class="v">${item.phaseName}</div></div><div class="fact"><div class="k">권장조치</div><div class="v">${item.recommendation}</div></div><div class="fact"><div class="k">검토금액</div><div class="v">${item.amount}</div></div></div></div><div><div class="section-title">판단기준별 Score</div><div class="criteria">${criteriaHtml}</div></div><div class="compare"><div class="pane"><h3>파손사진 AI 인식</h3><ul>${item.photos.map(text => `<li>${text}</li>`).join("")}</ul></div><div class="pane"><h3>견적/청구서 OCR</h3><ul>${item.docs.map(text => `<li>${text}</li>`).join("")}</ul></div></div><div><div class="section-title">AI 판단 레포트</div><div class="report">${item.report}</div></div><div><div class="section-title">검토회신 초안</div><textarea class="reply" id="replyDraft">${item.reply}</textarea></div><div class="actions"><button class="btn primary" type="button" data-action="approve">${item.stage === "손해사정" ? "AI 결과 확정" : "AI 결과 승인"}</button><button class="btn" type="button" data-action="edit">${item.stage === "손해사정" ? "수정 후 확정" : "수정 후 승인"}</button><button class="btn" type="button" data-action="request">자료보완 요청</button><button class="btn" type="button" data-action="reanalyze">AI 재검토</button></div><div><div class="section-title">처리이력 및 재분석 이력</div><div class="history">${item.history.map(text => `<div>${text}</div>`).join("")}</div></div></div>`;
}
function render() { renderSummaryCards(); renderList(); renderDetail(); }
function showToast(message) {
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = message;
  $("#toastWrap").appendChild(el);
  setTimeout(() => { el.classList.add("out"); setTimeout(() => el.remove(), 240); }, 2400);
}
function bindEvents() {
  $("#summaryCards").addEventListener("click", event => {
    const button = event.target.closest("[data-summary]"); if (!button) return;
    selectedSummary = selectedSummary === button.dataset.summary ? "all" : button.dataset.summary;
    render();
  });
  [["#searchInput","q"],["#stageFilter","stage"],["#decisionFilter","decision"],["#scoreFilter","score"],["#confidenceFilter","confidence"]].forEach(([selector,key]) => {
    const element = $(selector);
    const update = event => { filters[key] = event.target.value; render(); };
    element.addEventListener("input", update);
    element.addEventListener("change", update);
  });
  $("#resetFilters").addEventListener("click", () => {
    Object.assign(filters, { q:"", stage:"전체", decision:"전체", score:"전체", confidence:"전체" }); selectedSummary = "all";
    $("#searchInput").value = ""; ["#stageFilter","#decisionFilter","#scoreFilter","#confidenceFilter"].forEach(selector => { $(selector).value = "전체"; });
    render();
  });
  $("#reviewList").addEventListener("click", event => {
    const row = event.target.closest("[data-id]"); if (!row) return;
    selectedId = row.dataset.id;
    renderList(); renderDetail();
  });
  $("#reviewDetail").addEventListener("click", event => {
    const button = event.target.closest("[data-action]"); if (!button) return;
    showToast(`${button.textContent.trim()} 처리되었습니다. (프로토타입)`);
  });
}

render();
