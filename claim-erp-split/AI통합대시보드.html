const $=s=>document.querySelector(s);let selectedSummary="all";let selectedId=reviewItems[0].id;let currentScoreTimer=null;const filters={q:"",stage:"전체",decision:"전체",score:"전체",confidence:"전체"};
function escapeHtml(v){return String(v??"").replace(/[&<>'"]/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch]))}function scoreClass(i){if(i.score==null)return"wait";if(i.score>=85)return"good";if(i.score>=70)return"mid";if(i.score<50)return"bad";return"mid"}function decisionClass(d){if(d==="적정")return"ok";if(d==="조건부 적정")return"cond";if(d==="보류"||d.includes("대기"))return"hold";if(d==="분석실패")return"fail";if(d==="부적정")return"reject";return""}function matchesScore(i){const s=i.score;if(filters.score==="점수 미산출")return s==null;if(filters.score==="85점 이상")return s>=85;if(filters.score==="70~84점")return s>=70&&s<=84;if(filters.score==="50~69점")return s>=50&&s<=69;if(filters.score==="49점 이하")return s!=null&&s<=49;return true}function matchesConfidence(i){const c=i.confidence;if(filters.confidence==="미산출")return c==null;if(filters.confidence==="90% 이상")return c>=90;if(filters.confidence==="70~89%")return c>=70&&c<=89;if(filters.confidence==="70% 미만")return c!=null&&c<70;return true}function matchesSummary(i){if(selectedSummary==="all")return true;if(selectedSummary==="repairDone")return i.stage==="수리승인"&&i.decision==="적정";if(selectedSummary==="adjustDone")return i.stage==="완료";return i.group===selectedSummary}function filteredItems(){const q=filters.q.trim().toLowerCase();const priority={"보류":1,"조건부 적정":2,"분석실패":3,"자료대기":4,"AI 분석중":5,"적정":6};return reviewItems.filter(i=>matchesSummary(i)&&(filters.stage==="전체"||i.stage===filters.stage)&&(filters.decision==="전체"||i.decision===filters.decision)&&matchesScore(i)&&matchesConfidence(i)&&(!q||[i.id,i.shop,i.carNo,i.carName].some(v=>String(v).toLowerCase().includes(q)))).sort((a,b)=>(priority[a.decision]||9)-(priority[b.decision]||9)||b.elapsed-a.elapsed)}
function svgScore(label="-",score=0){const r=49,c=2*Math.PI*r,offset=c-(Math.max(0,Math.min(100,score))/100)*c;return`<div class="score-box"><svg class="score-svg" viewBox="0 0 120 120" aria-label="종합점수"><circle class="score-track" cx="60" cy="60" r="${r}"></circle><circle class="score-fill" cx="60" cy="60" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"></circle></svg><div class="score-number" data-score-target="${score}">${label}</div></div>`}
function animateScore(target){if(currentScoreTimer)clearInterval(currentScoreTimer);const el=document.querySelector("[data-score-target]");if(!el)return;if(target==null){el.textContent="-";return}let n=0;el.textContent="0점";currentScoreTimer=setInterval(()=>{n+=Math.max(1,Math.ceil(target/32));if(n>=target){n=target;clearInterval(currentScoreTimer)}el.textContent=`${n}점`},28)}

function renderList(){const items=filteredItems();if(!items.some(i=>i.id===selectedId))selectedId=items[0]?items[0].id:null;$("#listCount").textContent=`${items.length}건`;$("#reviewList").innerHTML=items.length?`<table><colgroup><col style="width:48px"><col style="width:128px"><col style="width:120px"><col style="width:96px"><col style="width:110px"><col style="width:86px"><col style="width:86px"><col style="width:104px"><col><col style="width:68px"></colgroup><thead><tr><th>순번</th><th>접수번호</th><th>정비업체</th><th>차량번호</th><th>차량명</th><th>심사점수</th><th>단계</th><th>판정</th><th>심사내용</th><th>상세</th></tr></thead><tbody>${items.map((i,idx)=>`<tr class="${i.id===selectedId?"active":""}" data-id="${i.id}"><td>${idx+1}</td><td><span class="cid">${i.id}</span></td><td>${i.shop}</td><td>${i.carNo}</td><td>${i.carName}</td><td><span class="score ${scoreClass(i)}">${i.score==null?i.decision:i.score+"점"}</span></td><td><span class="badge">${i.stage}</span></td><td><span class="badge ${decisionClass(i.decision)}">${i.decision}</span></td><td title="${escapeHtml(i.summary)}">${escapeHtml(i.summary)}</td><td><button class="move" type="button">이동</button></td></tr>`).join("")}</tbody></table>`:`<div style="padding:40px;text-align:center;color:var(--text-dim)">조건에 맞는 AI 검토대상이 없습니다.</div>`}

function renderDetailPage(){const i=reviewItems.find(v=>v.id===selectedId);if(!i)return;const criteria=i.criteria.length?i.criteria.map(([name,got,max,reason])=>`<div class="criterion"><div class="criterion-top"><span>${name}</span><b>${got} / ${max}</b></div><div class="criterion-bar"><span style="width:${Math.round(got/max*100)}%"></span></div><div class="criterion-reason">${reason}</div></div>`).join(""):`<div class="summary-report">심사점수 미산출 상태입니다. 부족자료 또는 실패사유를 먼저 해결해야 합니다.</div>`;$("#detailPage").innerHTML=`<section class="page-head"><div><h1>${i.id} 상세 분석</h1><p>${i.shop} · ${i.carNo} · ${i.carName}</p></div><div class="head-actions"><span class="demo-badge">시연모드</span><button class="btn" id="backDashboard" type="button">대시보드로 돌아가기</button></div></section><section class="detail-grid"><aside class="card"><div class="panel-head"><h2>종합 Score</h2><span class="badge ${decisionClass(i.decision)}">${i.decision}</span></div><div class="panel-body"><div class="mini-score">${svgScore(i.score==null?"-":i.score+"점",i.score||0)}</div><div class="facts"><div class="fact"><div class="k">AI 신뢰도</div><div class="v">${i.confidence==null?"미산출":i.confidence+"%"}</div></div><div class="fact"><div class="k">검토금액</div><div class="v">${i.amount}</div></div></div></div></aside><section class="card"><div class="panel-head"><h2>AI 상세 분석</h2><span class="count">판단기준·자료비교·회신초안</span></div><div class="panel-body"><div><div class="section-title">판단기준별 Score</div><div class="criteria">${criteria}</div></div><div class="compare"><div class="pane"><h3>파손사진 AI 인식</h3><ul>${i.photos.map(x=>`<li>${x}</li>`).join("")}</ul></div><div class="pane"><h3>견적/청구서 OCR</h3><ul>${i.docs.map(x=>`<li>${x}</li>`).join("")}</ul></div></div><div><div class="section-title">AI 판단 레포트</div><div class="summary-report">${i.report}</div></div><div><div class="section-title">검토회신 초안</div><textarea class="reply">${i.reply}</textarea></div><div class="actions"><button class="btn primary" data-action="approve" type="button">${i.stage==="손해사정"?"AI 결과 확정":"AI 결과 승인"}</button><button class="btn" data-action="edit" type="button">${i.stage==="손해사정"?"수정 후 확정":"수정 후 승인"}</button><button class="btn" data-action="request" type="button">자료보완 요청</button><button class="btn" data-action="reanalyze" type="button">AI 재검토</button></div><div><div class="section-title">처리이력 및 재분석 이력</div><div class="history">${i.history.map(x=>`<div>${x}</div>`).join("")}</div></div></div></section></section>`;animateScore(i.score)}
function render(){renderSummaryCards();renderList();renderSummaryPanel()}function showToast(m){const el=document.createElement("div");el.className="toast";el.textContent=m;$("#toastWrap").appendChild(el);setTimeout(()=>{el.classList.add("out");setTimeout(()=>el.remove(),240)},2400)}
function openRequestModal(){const modal=$("#requestModal");modal.innerHTML=`<div class="backdrop" data-close-modal></div><section class="modal"><div class="modal-head"><div><h2>AI 검토요청</h2><p style="color:var(--text-sub);margin-top:3px">시연모드에서는 단계 애니메이션 후 더미 분석결과를 표시합니다.</p></div><button class="btn" data-close-modal type="button">닫기</button></div><div class="modal-body"><div class="field"><label>접수번호</label><select id="requestClaim">${reviewItems.map(i=>`<option value="${i.id}">${i.id} · ${i.carName}</option>`).join("")}</select></div><div class="field"><label>분석단계</label><select id="requestStage"><option>수리 전 견적심사</option><option>수리 후 손해사정</option></select></div><div class="step-list" id="stepList">${analysisSteps.map((s,idx)=>`<div class="step" data-step="${idx}"><span class="dot">${idx+1}</span>${s}</div>`).join("")}</div><div class="analysis-result" id="analysisResult">시연모드 분석결과: 조건부 적정 76점 · AI 신뢰도 91% · 전조등 근접사진 확인 권장</div></div><div class="modal-foot"><button class="btn" data-close-modal type="button">취소</button><button class="btn primary" id="startAnalysisBtn" type="button">AI 분석 시작</button></div></section>`;modal.classList.add("open");modal.setAttribute("aria-hidden","false")}
function closeRequestModal(){const modal=$("#requestModal");modal.classList.remove("open");modal.setAttribute("aria-hidden","true");modal.innerHTML=""}function runAnalysisAnimation(){const btn=$("#startAnalysisBtn");btn.disabled=true;$("#analysisResult").classList.remove("show");analysisSteps.forEach((_,idx)=>{setTimeout(()=>{document.querySelectorAll(".step").forEach(s=>s.classList.remove("running"));const step=document.querySelector(`[data-step="${idx}"]`);if(step)step.classList.add("running");if(idx>0){const prev=document.querySelector(`[data-step="${idx-1}"]`);if(prev){prev.classList.remove("running");prev.classList.add("done")}}},idx*650)});setTimeout(()=>{document.querySelectorAll(".step").forEach(s=>{s.classList.remove("running");s.classList.add("done")});$("#analysisResult").classList.add("show");btn.disabled=false;showToast("시연모드 AI 분석결과가 생성되었습니다.")},analysisSteps.length*650+250)}
function bindEvents(){$("#summaryCards").addEventListener("click",e=>{const b=e.target.closest("[data-summary]");if(!b)return;selectedSummary=selectedSummary===b.dataset.summary?"all":b.dataset.summary;render()});[["#searchInput","q"],["#stageFilter","stage"],["#decisionFilter","decision"],["#scoreFilter","score"],["#confidenceFilter","confidence"]].forEach(([sel,key])=>{const el=$(sel);const update=e=>{filters[key]=e.target.value;render()};el.addEventListener("input",update);el.addEventListener("change",update)});$("#resetFilters").addEventListener("click",()=>{Object.assign(filters,{q:"",stage:"전체",decision:"전체",score:"전체",confidence:"전체"});selectedSummary="all";$("#searchInput").value="";["#stageFilter","#decisionFilter","#scoreFilter","#confidenceFilter"].forEach(sel=>$(sel).value="전체");render()});$("#reviewList").addEventListener("click",e=>{const row=e.target.closest("[data-id]");if(!row)return;selectedId=row.dataset.id;renderList();renderSummaryPanel()});$("#summaryPanel").addEventListener("click",e=>{if(e.target.closest("#openDetailBtn")){renderDetailPage();$("#dashboardView").classList.add("hidden");$("#detailPage").classList.add("active");return}const b=e.target.closest("[data-action]");if(b)showToast(`${b.textContent.trim()} 처리되었습니다. (프로토타입)`)});$("#detailPage").addEventListener("click",e=>{if(e.target.closest("#backDashboard")){$("#detailPage").classList.remove("active");$("#dashboardView").classList.remove("hidden");renderSummaryPanel();return}const b=e.target.closest("[data-action]");if(b)showToast(`${b.textContent.trim()} 처리되었습니다. (프로토타입)`)});$("#openRequestBtn").addEventListener("click",openRequestModal);$("#requestModal").addEventListener("click",e=>{if(e.target.closest("[data-close-modal]"))closeRequestModal();if(e.target.closest("#startAnalysisBtn"))runAnalysisAnimation()})}
bindEvents();render();
</script>
</body>
</html>
