<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CLAIM ERP | 화면 선택</title>
<style>
  :root { --bg:#EEF2F8; --card:#fff; --line:#D9E0EC; --line2:#C9D3E4; --blue:#2F5FBF; --ink:#22252E; --sub:#5B6273; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕",sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  .hub { width:100%; max-width:860px; padding:40px 20px 60px; }
  .hub-head { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .mark { width:40px; height:40px; border-radius:9px; background:var(--blue); color:#fff; font-weight:800; font-size:20px;
    display:flex; align-items:center; justify-content:center; }
  .hub-title { font-size:22px; font-weight:800; letter-spacing:-.3px; }
  .hub-title span { color:var(--blue); }
  .hub-sub { color:var(--sub); font-size:13px; margin:2px 0 26px 52px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .card { display:block; text-decoration:none; color:inherit; background:var(--card); border:1px solid var(--line2);
    border-radius:12px; padding:18px 18px 16px; transition:box-shadow .15s ease, transform .15s ease, border-color .15s ease; }
  .card:hover { box-shadow:0 10px 24px rgba(22,42,82,.12); transform:translateY(-2px); border-color:var(--blue); }
  .card .ic { width:38px; height:38px; border-radius:9px; background:#EEF3FB; color:var(--blue);
    display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
  .card .ic svg { width:22px; height:22px; }
  .card .nm { font-size:15px; font-weight:800; }
  .card .ds { font-size:12px; color:var(--sub); margin-top:4px; line-height:1.5; }
  .hub-foot { margin-top:28px; color:#8A90A0; font-size:11.5px; text-align:center; }
</style>
</head>
<body>
  <div class="hub">
    <div class="hub-head">
      <div class="mark">C</div>
      <div class="hub-title">CLAIM <span>ERP</span> · 화면 선택</div>
    </div>
    <div class="hub-sub">Claim 운영센터 — 열람할 화면을 선택하세요.</div>

    <div class="grid">
      <a class="card" href="smart-claims.html">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11"/><circle cx="4.5" cy="6" r="1.2"/><circle cx="4.5" cy="12" r="1.2"/><circle cx="4.5" cy="18" r="1.2"/></svg></div>
        <div class="nm">미결일괄조회</div>
        <div class="ds">사고건 단계별 통합 업무 리스트</div>
      </a>
      <a class="card" href="smart-intake.html">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M8 4h8a2 2 0 0 1 2 2v13a1 1 0 0 1-1.5.87L14 18.5l-2.5 1.4L9 18.5l-2.5 1.4A1 1 0 0 1 5 19V6a2 2 0 0 1 2-2Z"/><path d="M9 8h6M9 12h6"/></svg></div>
        <div class="nm">Smart업무처리</div>
        <div class="ds">사고 접수·계약·견적·결재 상세</div>
      </a>
      <a class="card" href="image-system.html">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="m4 17 4.5-4.5 3 3L16 11l4 4.5"/></svg></div>
        <div class="nm">이미지시스템</div>
        <div class="ds">차량·사고 사진 관리</div>
      </a>
      <a class="card" href="approval-list.html">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
        <div class="nm">결재 LIST</div>
        <div class="ds">추산·지급 결재 진행 현황</div>
      </a>
      <a class="card" href="assignment-management.html">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/><circle cx="9" cy="6" r="1.9" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.9" fill="currentColor" stroke="none"/><circle cx="7" cy="18" r="1.9" fill="currentColor" stroke="none"/></svg></div>
        <div class="nm">전결·순환배당 관리</div>
        <div class="ds">전결권한·순환배당 규칙 설정</div>
      </a>
      <a class="card" href="ai-dashboard.html">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13h4l2 5 4-12 2 7h6"/></svg></div>
        <div class="nm">AI 통합대시보드 <span style="font-size:10px;font-weight:700;color:var(--blue);background:#EEF3FB;border-radius:5px;padding:1px 5px;vertical-align:middle;">Pro</span></div>
        <div class="ds">AI 견적·손해사정 심사 및 검토회신</div>
      </a>
    </div>

    <div class="hub-foot">CLAIM ERP 프로토타입 · 각 화면은 좌측 메뉴로도 이동할 수 있습니다.</div>
  </div>
</body>
</html>
