<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>미결일괄조회 | CLAIM ERP</title>
<link rel="stylesheet" href="common.css" />
<style>
  /* ===== 미결일괄조회 — 상단 통합 검색필터 + 리스트 (포털 admin 스타일) ===== */
  #viewClaims .page-head { margin-bottom: 14px; }

  /* --- 검색 필터 카드 --- */
  #viewClaims .cl-filter { padding: 14px 16px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 12px; }
  #viewClaims .clf-row { display: flex; align-items: center; gap: 12px 18px; flex-wrap: wrap; }
  #viewClaims .clf-field { display: flex; align-items: center; gap: 8px; }
  #viewClaims .clf-field > label { font-size: 12.5px; font-weight: 700; color: var(--text-sub); white-space: nowrap; }
  #viewClaims .clf-grow { flex: 1; min-width: 260px; }

  /* 단계 select */
  #viewClaims .clf-select-wrap { position: relative; display: inline-flex; align-items: center; }
  #viewClaims .clf-select-wrap .clf-clock { position: absolute; left: 10px; width: 15px; height: 15px; color: var(--text-dim); pointer-events: none; }
  #viewClaims #stageSelect { appearance: none; -webkit-appearance: none; padding: 8px 30px 8px 30px; border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; }
  #viewClaims .clf-select-wrap::after { content: ""; position: absolute; right: 12px; width: 7px; height: 7px; border-right: 2px solid var(--text-dim); border-bottom: 2px solid var(--text-dim); transform: rotate(45deg); margin-top: -3px; pointer-events: none; }

  /* 조치유형 체크박스 */
  #viewClaims .clf-checks { display: flex; align-items: center; gap: 7px 14px; flex-wrap: wrap; }
  #viewClaims .clf-check { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; color: var(--text-sub); cursor: pointer; user-select: none; }
  #viewClaims .clf-check input { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; }
  #viewClaims .clf-check-all span { font-weight: 700; color: var(--text); }

  /* 계획 버튼 그룹 */
  #viewClaims .clf-plan { display: inline-flex; border: 1px solid var(--line-strong); border-radius: 8px; overflow: hidden; }
  #viewClaims .clf-plan button { display: inline-flex; align-items: center; gap: 4px; padding: 7px 13px; border: 0; border-left: 1px solid var(--line); background: #fff; font-size: 12.5px; font-weight: 700; color: var(--text-sub); cursor: pointer; }
  #viewClaims .clf-plan button:first-child { border-left: 0; }
  #viewClaims .clf-plan button:hover { background: #F5F8FC; }
  #viewClaims .clf-plan button.active { background: #232B39; color: #fff; }
  #viewClaims .clf-plan .star { font-size: 12px; }
  #viewClaims .clf-plan .star.urgent { color: var(--red); }
  #viewClaims .clf-plan .star.watch { color: var(--blue); }
  #viewClaims .clf-plan button.active .star { color: #fff; }

  /* 인풋 */
  #viewClaims #shopInput, #viewClaims #searchInput { padding: 8px 12px; border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; font-size: 13px; color: var(--text); }
  #viewClaims #shopInput { width: 190px; }
  #viewClaims .clf-search { position: relative; flex: 1; display: flex; }
  #viewClaims .clf-search input { flex: 1; padding-right: 34px; }
  #viewClaims .clf-search svg { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-dim); pointer-events: none; }
  #viewClaims #shopInput:focus, #viewClaims #searchInput:focus, #viewClaims #stageSelect:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }

  /* 액션 버튼 */
  #viewClaims .clf-actions { display: inline-flex; gap: 8px; margin-left: auto; }
  #viewClaims .btn-reset { padding: 8px 16px; border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; font-size: 13px; font-weight: 700; color: var(--text-sub); cursor: pointer; }
  #viewClaims .btn-reset:hover { border-color: var(--text-dim); color: var(--text); }
  #viewClaims .btn-search { padding: 8px 22px; border: 1px solid #232B39; border-radius: 8px; background: #232B39; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; }
  #viewClaims .btn-search:hover { background: #2E3849; }

  /* --- 단계 통계 카드 --- */
  #viewClaims .cl-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
  #viewClaims .cl-stat { text-align: left; padding: 16px 18px; border: 1.5px solid var(--line); border-radius: var(--radius); background: var(--card); box-shadow: var(--shadow); cursor: pointer; transition: border-color .15s, transform .15s; }
  #viewClaims .cl-stat:hover { border-color: var(--blue-line); transform: translateY(-2px); }
  #viewClaims .cl-stat.active { border-color: var(--blue); box-shadow: 0 2px 10px rgba(37,99,235,.16); }
  #viewClaims .cs-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  #viewClaims .cs-no { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 7px; background: #232B39; color: #fff; font-size: 12px; font-weight: 800; }
  #viewClaims .cl-stat.active .cs-no { background: var(--blue); }
  #viewClaims .cs-name { font-size: 13.5px; font-weight: 700; color: var(--text-sub); }
  #viewClaims .cl-stat.active .cs-name { color: var(--blue-dark); }
  #viewClaims .cs-count { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -.5px; }
  #viewClaims .cs-count small { font-size: 13px; font-weight: 700; color: var(--text-dim); margin-left: 3px; }

  /* --- 요약 라인 --- */
  #viewClaims .cl-summary { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0 2px 10px; }
  #viewClaims .cls-left { font-size: 13px; color: var(--text); }
  #viewClaims .cls-left b { font-weight: 800; }
  #viewClaims .cls-dim { color: var(--text-dim); font-weight: 500; }
  #viewClaims #pageSizeSelect { padding: 6px 10px; border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; font-size: 12.5px; color: var(--text-sub); cursor: pointer; }

  /* --- 리스트 카드 --- */
  #viewClaims .list-card { min-height: 0; padding: 4px 4px 6px; }
  #viewClaims .list-card .rows { max-height: none; overflow: visible; }
  #viewClaims .cl-table thead th { white-space: normal; line-height: 1.25; background: #F5F8FC; }
  #viewClaims .cl-table .col-check input { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; vertical-align: middle; margin: 0; }
  #viewClaims .cl-table .cseq { color: var(--text-dim); font-variant-numeric: tabular-nums; font-weight: 700; }
  #viewClaims .cust-badge { display: inline-flex; align-items: center; padding: 1px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 700; }
  #viewClaims .cust-badge.rent { color: var(--blue-dark); background: var(--blue-soft); }
  #viewClaims .cust-badge.lease { color: var(--amber); background: var(--amber-soft); }
  #viewClaims .cl-table .num.est { color: var(--text); }   /* 추산 = 검정 */
  #viewClaims .cl-table .num.pay { color: var(--red); }     /* 지급 = 빨강 */
  #viewClaims .cl-table tbody.row.plan-urgent td { background: #FEF2F2; }
  #viewClaims .cl-table tbody.row.plan-watch  td { background: #EFF5FF; }
  #viewClaims .cl-table tbody.row.plan-urgent:hover td { background: #FDE8E8; }
  #viewClaims .cl-table tbody.row.plan-watch:hover  td { background: #E4EEFF; }

  /* 별점(계획) 버튼 */
  #viewClaims .star-btn { border: 0; background: none; cursor: pointer; font-size: 15px; line-height: 1; padding: 2px; color: var(--line-strong); transition: transform .1s; }
  #viewClaims .star-btn.urgent { color: var(--red); }
  #viewClaims .star-btn.watch  { color: var(--blue); }
  #viewClaims .star-btn:hover { transform: scale(1.18); }

  /* Y/N 배지 */
  #viewClaims .yn { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 20px; padding: 0 5px; font-size: 11.5px; font-weight: 800; border-radius: 6px; line-height: 1; }
  #viewClaims .yn-y { color: var(--green); background: var(--green-soft); }
  #viewClaims .yn-n { color: var(--text-dim); background: #EEF1F6; }

  /* 페이지네이션 */
  #viewClaims .cl-pager { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 14px 0 6px; }
  #viewClaims .cl-pager button { min-width: 30px; height: 30px; padding: 0 8px; border: 1px solid var(--line); border-radius: 7px; background: #fff; font-size: 12.5px; font-weight: 700; color: var(--text-sub); cursor: pointer; }
  #viewClaims .cl-pager button:hover:not(:disabled) { border-color: var(--blue-line); color: var(--blue); }
  #viewClaims .cl-pager .pg-num.active { background: #232B39; border-color: #232B39; color: #fff; }
  #viewClaims .cl-pager button:disabled { color: var(--line-strong); cursor: default; }

  @media (max-width: 900px) {
    #viewClaims .cl-stats { grid-template-columns: repeat(2, 1fr); }
    #viewClaims .clf-actions { margin-left: 0; }
  }

  /* --- 모드변경(시연) 버튼 : 데모의 .mode-btn 톤과 동일한 아웃라인 버튼 --- */
  .topbar-right .mode-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 13px; border-radius: 8px; border: 1px solid var(--line-strong); background: #fff; color: var(--text-sub); font-size: 12px; font-weight: 800; text-decoration: none; cursor: pointer; font-family: inherit; }
  .topbar-right .mode-btn:hover { border-color: #232B39; color: #232B39; }
  .topbar-right .mode-btn svg { width: 14px; height: 14px; }

  /* --- 기능 설명 툴팁 (버튼 hover 시 노출) --- */
  #clTooltip {
    position: fixed; z-index: 9999; max-width: 300px;
    background: #1B2430; color: #fff;
    font-size: 11.5px; font-weight: 500; line-height: 1.55;
    padding: 8px 11px; border-radius: 9px;
    box-shadow: 0 8px 22px rgba(16, 30, 54, .3);
    pointer-events: none; opacity: 0; transform: translateY(4px);
    transition: opacity .12s ease, transform .12s ease;
    white-space: normal; word-break: keep-all;
  }
  #clTooltip.show { opacity: 1; transform: translateY(0); }
  #clTooltip::after {
    content: ""; position: absolute; left: var(--tip-arrow, 50%);
    width: 9px; height: 9px; background: #1B2430;
    transform: translateX(-50%) rotate(45deg);
  }
  #clTooltip.above::after { bottom: -4px; }
  #clTooltip.below::after { top: -4px; }
  /* hover 시 설명 대상임을 은근히 안내 */
  #viewClaims [data-desc] { cursor: pointer; }
  #viewClaims #shopInput[data-desc], #viewClaims .clf-search[data-desc] { cursor: text; }
</style>
</head>
