<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Smart접수지 | CLAIM ERP</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #fff;
        --line: #d9e2ef;
        --text: #172033;
        --muted: #66758f;
        --blue: #1d6fdc;
        --blue2: #eaf3ff;
        --green: #16a34a;
        --amber: #d97706;
        --red: #dc2626;
        --shadow: 0 10px 28px rgba(20, 35, 60, 0.08);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, "Noto Sans KR", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      .app {
        display: grid;
        grid-template-columns: 230px 1fr;
        min-height: 100vh;
      }
      .side-nav {
        background: #0f2747;
        color: #dce8f8;
        padding: 18px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .brand {
        font-size: 20px;
        font-weight: 800;
        padding: 8px 10px 18px;
      }
      .brand small {
        display: block;
        font-size: 12px;
        color: #9fb5d0;
        margin-top: 5px;
      }
      .side-nav a {
        padding: 12px 13px;
        border-radius: 10px;
        color: #cbd8ea;
        font-weight: 700;
      }
      .side-nav a:hover,
      .side-nav a.active {
        background: #1d6fdc;
        color: #fff;
      }
      .main {
        padding: 22px;
      }
      .topbar {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .tag {
        font-size: 13px;
        font-weight: 800;
        color: #1d6fdc;
        background: #eaf3ff;
        border: 1px solid #cfe3ff;
        padding: 7px 10px;
        border-radius: 999px;
      }
      .user {
        font-size: 13px;
        color: var(--muted);
      }
      .page-head h1 {
        margin: 0 0 6px;
        font-size: 27px;
      }
      .page-head p {
        margin: 0 0 18px;
        color: var(--muted);
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
      }
      .btn {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 9px;
        padding: 9px 12px;
        font-weight: 800;
        cursor: pointer;
      }
      .btn.primary {
        background: var(--blue);
        border-color: var(--blue);
        color: #fff;
      }
      .btn.warn {
        background: #fff7ed;
        border-color: #fed7aa;
        color: #b45309;
      }
      .btn.danger {
        background: #fef2f2;
        border-color: #fecaca;
        color: #b91c1c;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .flow {
        grid-template-columns: repeat(4, 1fr);
        margin: 14px 0;
      }
      .flow-card {
        padding: 15px;
        cursor: pointer;
      }
      .flow-card.active {
        border-color: #65a8ff;
        background: var(--blue2);
      }
      .flow-card b {
        display: block;
        font-size: 24px;
        margin-top: 8px;
      }
      .workspace {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr) 330px;
        gap: 14px;
      }
      .tabs {
        padding: 14px;
      }
      .tab {
        width: 100%;
        text-align: left;
        margin: 6px 0;
      }
      .tab.active {
        background: var(--blue2);
        border-color: #9bc7ff;
        color: #0f54b8;
      }
      .list-card {
        padding: 14px;
      }
      .list-head {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }
      .search {
        margin-left: auto;
        min-width: 260px;
        padding: 9px;
        border: 1px solid var(--line);
        border-radius: 9px;
      }
      .table {
        width: 100%;
        border-collapse: collapse;
      }
      .table th,
      .table td {
        padding: 10px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        text-align: left;
      }
      .table th {
        background: #f8fafc;
        color: #52627a;
      }
      .table tr {
        cursor: pointer;
      }
      .table tr.active {
        background: #eef6ff;
      }
      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        background: #eef2ff;
        color: #314f9b;
      }
      .badge.done {
        background: #dcfce7;
        color: #166534;
      }
      .badge.hold {
        background: #fff7ed;
        color: #9a3412;
      }
      .panel {
        padding: 16px;
      }
      .kv {
        display: grid;
        grid-template-columns: 95px 1fr;
        gap: 8px;
        font-size: 13px;
        margin: 12px 0;
      }
      .muted {
        color: var(--muted);
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        background: #13233a;
        color: #fff;
        padding: 12px 14px;
        border-radius: 10px;
        box-shadow: var(--shadow);
        display: none;
      }
      .toast.on {
        display: block;
      }
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 30, 50, 0.35);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal.on {
        display: flex;
      }
      .dialog {
        background: #fff;
        border-radius: 16px;
        padding: 18px;
        max-width: 560px;
        width: 100%;
        box-shadow: var(--shadow);
      }
      .form {
        display: grid;
        gap: 10px;
      }
      .form input,
      .form select,
      .form textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 9px;
      }
      .two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .cards {
        grid-template-columns: repeat(5, 1fr);
        margin: 14px 0;
      }
      .summary {
        padding: 14px;
        cursor: pointer;
      }
      .summary.active {
        background: var(--blue2);
        border-color: #9bc7ff;
      }
      .images {
        display: grid;
        grid-template-columns: 260px 180px 1fr;
        gap: 14px;
      }
      .list {
        padding: 12px;
      }
      .list button {
        display: block;
        width: 100%;
        margin: 6px 0;
        text-align: left;
      }
      .thumbs {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px;
      }
      .thumb {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        cursor: pointer;
        background: #fff;
      }
      .thumb.active {
        outline: 3px solid #93c5fd;
      }
      .ph {
        height: 88px;
        border-radius: 8px;
        background: linear-gradient(135deg, #dbeafe, #f8fafc);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #4876b7;
        font-weight: 800;
        margin-bottom: 8px;
      }
      .toolbar {
        padding: 14px;
        display: flex;
        gap: 10px;
        align-items: end;
        flex-wrap: wrap;
      }
      .field label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        font-weight: 800;
        margin-bottom: 5px;
      }
      .field input,
      .field select {
        padding: 9px;
        border: 1px solid var(--line);
        border-radius: 9px;
      }
      .simple-layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 14px;
      }
      @media (max-width: 1000px) {
        .app {
          grid-template-columns: 1fr;
        }
        .side-nav {
          position: static;
        }
        .workspace,
        .images,
        .simple-layout {
          grid-template-columns: 1fr;
        }
        .flow,
        .cards {
          grid-template-columns: 1fr 1fr;
        }
        .search {
          min-width: 0;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side-nav">
        <div class="brand">CLAIM <b>ERP</b><small>Claim 운영센터</small></div>
        <a class="" href="./smart-work.html">Smart업무관리</a
        ><a class="active" href="./smart-receipt.html">Smart접수지</a
        ><a class="" href="./image-system.html">이미지시스템</a
        ><a class="" href="./approval-list.html">결재 LIST</a
        ><a class="" href="./delegation-rotation.html">전결&순환배당관리</a>
      </aside>
      <main class="main">
        <header class="topbar">
          <span class="tag">Smart접수지</span
          ><span class="user">박지현 매니저 · Claim운영1팀</span>
        </header>
        <section class="page-head">
          <h1>Smart접수지</h1>
          <p>사고건을 조회하고 접수 메모와 미결 속성을 저장합니다.</p>
        </section>
        <section class="simple-layout">
          <section class="card list-card">
            <div class="list-head">
              <h2>사고건 조회</h2>
              <input
                class="search"
                id="q"
                placeholder="사고번호·고객·차량 검색"
              />
            </div>
            <table class="table">
              <thead>
                <tr>
                  <th>사고번호</th>
                  <th>고객</th>
                  <th>차량</th>
                  <th>단계</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </section>
          <aside class="panel card" id="form"></aside>
        </section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <div class="modal" id="modal"><div class="dialog" id="dialog"></div></div>
    <script>
      const claims = [
        {
          id: "CLM-2026-0001",
          stage: "접수·선견적",
          type: "계약확인",
          customer: "김민수",
          car: "12하3456",
          shop: "강남공업사",
          manager: "박지현",
          status: "진행중",
          memo: "계약정보 확인 필요",
        },
        {
          id: "CLM-2026-0002",
          stage: "수리 승인",
          type: "승인대기",
          customer: "이서연",
          car: "34허7788",
          shop: "서초모터스",
          manager: "최민재",
          status: "보류",
          memo: "부품 견적 확인",
        },
        {
          id: "CLM-2026-0003",
          stage: "손해사정",
          type: "AOS청구",
          customer: "정도윤",
          car: "56호9911",
          shop: "분당정비",
          manager: "박지현",
          status: "진행중",
          memo: "손해사정 결과 대기",
        },
        {
          id: "CLM-2026-0004",
          stage: "접수·선견적",
          type: "업체 미회신",
          customer: "한지우",
          car: "78가1234",
          shop: "수원공업사",
          manager: "김나비",
          status: "진행중",
          memo: "공업사 회신 요청 대상",
        },
        {
          id: "CLM-2026-0005",
          stage: "지급 / 정산",
          type: "정산대기",
          customer: "오하준",
          car: "90나4567",
          shop: "인천바디샵",
          manager: "최민재",
          status: "완료",
          memo: "지급자료 확인",
        },
      ];
      const $ = (s) => document.querySelector(s);
      function toast(m) {
        const t = $("#toast");
        t.textContent = m;
        t.classList.add("on");
        setTimeout(() => t.classList.remove("on"), 1800);
      }
      function closeModal() {
        $("#modal").classList.remove("on");
      }
      let selected =
        new URLSearchParams(location.search).get("claim") || claims[0].id;
      const saved = JSON.parse(localStorage.getItem("receiptSaved") || "{}");
      function list() {
        let q = $("#q").value.trim();
        return claims.filter(
          (c) => !q || Object.values(c).join(" ").includes(q),
        );
      }
      function renderRows() {
        let arr = list();
        if (!arr.some((c) => c.id == selected)) selected = arr[0]?.id;
        $("#rows").innerHTML = arr
          .map(
            (c) =>
              `<tr data-id="${c.id}" class="${c.id == selected ? "active" : ""}"><td>${c.id}</td><td>${c.customer}</td><td>${c.car}</td><td>${c.stage}</td></tr>`,
          )
          .join("");
        renderForm();
      }
      function renderForm() {
        let c = claims.find((x) => x.id == selected) || claims[0],
          s = saved[c.id] || {};
        $("#form").innerHTML =
          `<h2>${c.id}</h2><div class="kv"><b>고객</b><span>${c.customer}</span><b>차량</b><span>${c.car}</span><b>정비공장</b><span>${c.shop}</span></div><div class="form"><label>상담 메모<textarea id="memo" rows="5">${s.memo || c.memo}</textarea></label><label>미결 속성<select id="prop"><option ${s.prop == "일반" ? "selected" : ""}>일반</option><option ${s.prop == "업체 미회신" ? "selected" : ""}>업체 미회신</option><option ${s.prop == "관리자 확인" ? "selected" : ""}>관리자 확인</option></select></label><label>속성 메모<input id="propMemo" value="${s.propMemo || ""}"></label><button class="btn primary" id="save">저장</button></div>`;
        $("#save").onclick = () => {
          saved[c.id] = {
            memo: $("#memo").value,
            prop: $("#prop").value,
            propMemo: $("#propMemo").value,
          };
          localStorage.setItem("receiptSaved", JSON.stringify(saved));
          toast("Smart접수지 메모와 속성을 저장했습니다.");
        };
      }
      $("#rows").onclick = (e) => {
        let r = e.target.closest("[data-id]");
        if (r) {
          selected = r.dataset.id;
          renderRows();
        }
      };
      $("#q").oninput = renderRows;
      renderRows();
    </script>
  </body>
</html>
