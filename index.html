<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SK렌탈 Claim Flow 관리</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --blue: #1d5fd1;
      --blue-dark: #164ea8;
      --blue-soft: #eaf2ff;
      --text: #172033;
      --muted: #667085;
      --line: #e4e9f2;
      --red: #e5484d;
      --red-soft: #fff0f0;
      --orange: #f79009;
      --orange-soft: #fff7e8;
      --green: #16a34a;
      --green-soft: #ecfdf3;
      --shadow: 0 14px 35px rgba(20, 40, 80, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 1180px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
    }

    .app { padding: 28px; }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 20px;
    }
    .eyebrow { color: var(--blue); font-weight: 800; font-size: 13px; letter-spacing: .08em; }
    h1 { margin: 7px 0 8px; font-size: 30px; letter-spacing: -0.04em; }
    .subtitle { margin: 0; color: var(--muted); font-size: 15px; }
    .view-all {
      border: 1px solid #b9c8e8;
      background: #fff;
      color: var(--blue-dark);
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(29, 95, 209, .08);
    }
    .view-all.active, .view-all:hover { background: var(--blue); color: white; border-color: var(--blue); }

    .flow-wrap {
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .flow-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 26px; position: relative; }
    .flow-card {
      position: relative;
      min-height: 190px;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 20px;
      padding: 18px;
      cursor: pointer;
      transition: .18s ease;
    }
    .flow-card:not(:last-child)::after {
      content: "→";
      position: absolute;
      right: -23px;
      top: 50%;
      transform: translateY(-50%);
      color: #9aa8bd;
      font-size: 24px;
      font-weight: 900;
    }
    .flow-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(20,40,80,.10); }
    .flow-card.active { border: 2px solid var(--blue); background: linear-gradient(180deg, #f7fbff 0%, #fff 82%); }
    .flow-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
    .flow-step { font-size: 17px; font-weight: 900; letter-spacing: -0.03em; }
    .flow-count { margin-top: 14px; display: flex; gap: 8px; align-items: center; }
    .pending { font-size: 28px; font-weight: 900; color: var(--blue-dark); }
    .small { color: var(--muted); font-size: 12px; font-weight: 700; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 900; }
    .badge.danger { color: var(--red); background: var(--red-soft); }
    .badge.warn { color: #b85f00; background: var(--orange-soft); }
    .badge.normal { color: #177245; background: var(--green-soft); }
    .tasks { margin: 14px 0 0; padding-left: 17px; color: #475467; font-size: 12.5px; line-height: 1.62; }
    .metric-line { margin: 12px 6px 0; color: #52637a; font-size: 13px; }

    .main { display: grid; grid-template-columns: 230px minmax(650px, 1fr) 360px; gap: 18px; margin-top: 18px; align-items: start; }
    .panel { background: var(--card); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); }
    .left { padding: 16px; position: sticky; top: 16px; }
    .current-stage { background: #f4f7fb; border-radius: 14px; padding: 13px; margin-bottom: 14px; }
    .current-stage span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; margin-bottom: 4px; }
    .current-stage strong { color: var(--blue-dark); }
    .tab { width: 100%; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; background: transparent; border-radius: 12px; padding: 12px 11px; margin: 5px 0; cursor: pointer; color: #344054; font-weight: 800; text-align: left; }
    .tab:hover { background: #f5f8ff; }
    .tab.active { background: var(--blue-soft); border-color: #c7dcff; color: var(--blue-dark); }
    .tab .num { color: var(--muted); font-size: 12px; }

    .list { overflow: hidden; }
    .list-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--line); }
    .list-head h2 { margin: 0; font-size: 17px; }
    .list-head p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 12px 10px; color: #667085; background: #fbfcfe; font-size: 12px; border-bottom: 1px solid var(--line); white-space: nowrap; }
    td { padding: 13px 10px; border-bottom: 1px solid #eef2f7; white-space: nowrap; }
    tr { cursor: pointer; }
    tbody tr:hover { background: #f8fbff; }
    tbody tr.selected { background: #eef6ff; box-shadow: inset 4px 0 0 var(--blue); }
    .status { border-radius: 999px; padding: 5px 9px; font-weight: 900; font-size: 12px; background: #f2f4f7; color: #475467; }
    .status.done { background: var(--green-soft); color: var(--green); }
    .status.hold { background: #fff1f3; color: #c01048; }
    .status.doing { background: var(--blue-soft); color: var(--blue-dark); }

    .detail { padding: 18px; position: sticky; top: 16px; }
    .detail h2 { margin: 0 0 12px; font-size: 18px; }
    .claim-no { color: var(--blue); font-size: 14px; font-weight: 900; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
    .info { background: #f8fafd; border-radius: 12px; padding: 10px; }
    .info span { display: block; color: var(--muted); font-size: 11px; font-weight: 800; margin-bottom: 4px; }
    .info strong { font-size: 13px; }
    .message-box { border: 1px solid var(--line); border-radius: 14px; padding: 13px; margin-top: 10px; background: #fff; }
    .message-box span { color: var(--muted); display: block; font-size: 12px; font-weight: 900; margin-bottom: 7px; }
    .message-box p { margin: 0; line-height: 1.55; font-size: 13px; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
    button.action { border: 1px solid #cbd5e1; background: #fff; color: #344054; border-radius: 11px; padding: 10px; font-weight: 850; cursor: pointer; }
    button.action:hover { border-color: var(--blue); color: var(--blue); background: #f8fbff; }
    textarea { width: 100%; min-height: 82px; margin-top: 12px; border: 1px solid #ccd6e4; border-radius: 13px; padding: 12px; resize: vertical; font-family: inherit; }
    .bottom-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 10px; }
    .primary, .secondary { border: 0; border-radius: 12px; padding: 12px; font-weight: 900; cursor: pointer; }
    .primary { background: var(--blue); color: #fff; }
    .primary:hover { background: var(--blue-dark); }
    .secondary { background: #f2f4f7; color: #475467; border: 1px solid #d0d5dd; }
    .toast { position: fixed; right: 28px; bottom: 28px; background: #101828; color: #fff; padding: 14px 18px; border-radius: 14px; box-shadow: 0 14px 35px rgba(0,0,0,.24); opacity: 0; transform: translateY(16px); pointer-events: none; transition: .22s ease; font-weight: 800; z-index: 20; }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>

      document.getElementById('tabs').innerHTML = actionTabs.map(tab => {
        const count = claims.filter(c => (!selectedStage || c.flowStage === selectedStage) && (tab === '전체 조치유형' || c.type === tab)).length;
        return `<button class="tab ${selectedType === tab ? 'active' : ''}" onclick="selectType('${tab}')"><span>${tab}</span><span class="num">${count}</span></button>`;
      }).join('');
    }

    function renderTable() {
      const rows = filteredClaims();
      if (!rows.some(c => c.id === selectedId) && rows[0]) selectedId = rows[0].id;
      document.getElementById('resultCount').textContent = `${rows.length}건`;
      document.getElementById('filterSummary').textContent = `${selectedStage || '전체 Flow'} · ${selectedType}`;
      document.getElementById('claimRows').innerHTML = rows.map(c => `
        <tr class="${selectedId === c.id ? 'selected' : ''}" onclick="selectClaim('${c.id}')">
          <td><span class="badge ${badgeClass(c.urgency)}">${c.urgency}</span></td><td><strong>${c.id}</strong></td><td>${c.customer}</td><td>${c.car}</td><td>${c.flowStage}</td><td>${c.type}</td><td>${c.status}</td><td>${c.elapsed}</td><td>${c.owner}</td><td><span class="status ${statusClass(c.process)}">${c.process}</span></td>
        </tr>`).join('') || '<tr><td colspan="10" style="text-align:center;color:#667085;padding:34px;">조건에 맞는 Claim 건이 없습니다.</td></tr>';
    }

    function renderDetail() {
      const claim = claims.find(c => c.id === selectedId) || filteredClaims()[0];
      const panel = document.getElementById('detailPanel');
      if (!claim) { panel.innerHTML = '<h2>선택된 사고건이 없습니다.</h2>'; return; }
      selectedId = claim.id;
      const actions = actionsByStage[claim.flowStage];
      panel.innerHTML = `
        <div class="claim-no">${claim.id}</div><h2>${claim.customer} · ${claim.car}</h2>
        <div class="info-grid">
          <div class="info"><span>고객구분</span><strong>${claim.segment}</strong></div><div class="info"><span>현재 Flow 단계</span><strong>${claim.flowStage}</strong></div>
          <div class="info"><span>현재상태</span><strong>${claim.status}</strong></div><div class="info"><span>조치유형</span><strong>${claim.type}</strong></div>
          <div class="info"><span>경과시간</span><strong>${claim.elapsed}</strong></div><div class="info"><span>담당자</span><strong>${claim.owner}</strong></div>
        </div>
        <div class="message-box"><span>조치 필요 내용</span><p>${claim.need}</p></div>
        <div class="message-box"><span>다음 권장 액션</span><p>${claim.next}</p></div>
        <div class="actions">${actions.map(a => `<button class="action" onclick="quickAction('${a}')">${a}</button>`).join('')}</div>
        <textarea placeholder="처리 메모를 입력하세요. 예) 공업사 통화 완료, 선견적 재요청"></textarea>
        <div class="bottom-actions"><button class="primary" onclick="updateProcess('완료')">처리완료</button><button class="secondary" onclick="updateProcess('보류')">보류 처리</button></div>`;
    }

    function renderAll() { renderFlow(); renderTabs(); renderTable(); renderDetail(); }
    function selectStage(stage) { selectedStage = stage; selectedType = '전체 조치유형'; selectedId = filteredClaims()[0]?.id || selectedId; renderAll(); }
    function selectType(type) { selectedType = type; selectedId = filteredClaims()[0]?.id || selectedId; renderAll(); }
    function selectClaim(id) { selectedId = id; renderTable(); renderDetail(); }
    function quickAction(action) { showToast(`${action} 액션이 실행되었습니다.`); }
    function updateProcess(process) {
      claims = claims.map(c => c.id === selectedId ? { ...c, process } : c);
      showToast(`${selectedId} 처리상태가 ${process}(으)로 변경되었습니다.`);
      renderAll();
    }

    document.getElementById('viewAllButton').addEventListener('click', () => { selectedStage = null; selectedType = '전체 조치유형'; selectedId = filteredClaims()[0]?.id || selectedId; renderAll(); });
    renderAll();
  </script>
</body>
</html>
