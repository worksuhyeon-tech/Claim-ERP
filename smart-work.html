<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Smart업무관리 | CLAIM ERP</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #fff;
        --line: #d9e2ef;
        --text: #172033;
        --muted: #66758f;
        --blue: #1d6fdc;
        --blue2: #eaf3ff;
        --green: #16a34a;
        --amber: #d97706;
        --red: #dc2626;
        --shadow: 0 10px 28px rgba(20, 35, 60, 0.08);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, "Noto Sans KR", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      .app {
        display: grid;
        grid-template-columns: 230px 1fr;
        min-height: 100vh;
      }
      .side-nav {
        background: #0f2747;
        color: #dce8f8;
        padding: 18px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .brand {
        font-size: 20px;
        font-weight: 800;
        padding: 8px 10px 18px;
      }
      .brand small {
        display: block;
        font-size: 12px;
        color: #9fb5d0;
        margin-top: 5px;
      }
      .side-nav a {
        padding: 12px 13px;
        border-radius: 10px;
        color: #cbd8ea;
        font-weight: 700;
      }
      .side-nav a:hover,
      .side-nav a.active {
        background: #1d6fdc;
        color: #fff;
      }
      .main {
        padding: 22px;
      }
      .topbar {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .tag {
        font-size: 13px;
        font-weight: 800;
        color: #1d6fdc;
        background: #eaf3ff;
        border: 1px solid #cfe3ff;
        padding: 7px 10px;
        border-radius: 999px;
      }
      .user {
        font-size: 13px;
        color: var(--muted);
      }
      .page-head h1 {
        margin: 0 0 6px;
        font-size: 27px;
      }
      .page-head p {
        margin: 0 0 18px;
        color: var(--muted);
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
      }
      .btn {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 9px;
        padding: 9px 12px;
        font-weight: 800;
        cursor: pointer;
      }
      .btn.primary {
        background: var(--blue);
        border-color: var(--blue);
        color: #fff;
      }
      .btn.warn {
        background: #fff7ed;
        border-color: #fed7aa;
        color: #b45309;
      }
      .btn.danger {
        background: #fef2f2;
        border-color: #fecaca;
        color: #b91c1c;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .flow {
        grid-template-columns: repeat(4, 1fr);
        margin: 14px 0;
      }
      .flow-card {
        padding: 15px;
        cursor: pointer;
      }
      .flow-card.active {
        border-color: #65a8ff;
        background: var(--blue2);
      }
      .flow-card b {
        display: block;
        font-size: 24px;
        margin-top: 8px;
      }
      .workspace {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr) 330px;
        gap: 14px;
      }
      .tabs {
        padding: 14px;
      }
      .tab {
        width: 100%;
        text-align: left;
        margin: 6px 0;
      }
      .tab.active {
        background: var(--blue2);
        border-color: #9bc7ff;
        color: #0f54b8;
      }
      .list-card {
        padding: 14px;
      }
      .list-head {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }
      .search {
        margin-left: auto;
        min-width: 260px;
        padding: 9px;
        border: 1px solid var(--line);
        border-radius: 9px;
      }
      .table {
        width: 100%;
        border-collapse: collapse;
      }
      .table th,
      .table td {
        padding: 10px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        text-align: left;
      }
      .table th {
        background: #f8fafc;
        color: #52627a;
      }
      .table tr {
        cursor: pointer;
      }
      .table tr.active {
        background: #eef6ff;
      }
      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        background: #eef2ff;
        color: #314f9b;
      }
      .badge.done {
        background: #dcfce7;
        color: #166534;
      }
      .badge.hold {
        background: #fff7ed;
        color: #9a3412;
      }
      .panel {
        padding: 16px;
      }
      .kv {
        display: grid;
        grid-template-columns: 95px 1fr;
        gap: 8px;
        font-size: 13px;
        margin: 12px 0;
      }
      .muted {
        color: var(--muted);
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        background: #13233a;
        color: #fff;
        padding: 12px 14px;
        border-radius: 10px;
        box-shadow: var(--shadow);
        display: none;
      }
      .toast.on {
        display: block;
      }
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 30, 50, 0.35);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal.on {
        display: flex;
      }
      .dialog {
        background: #fff;
        border-radius: 16px;
        padding: 18px;
        max-width: 560px;
        width: 100%;
        box-shadow: var(--shadow);
      }
      .form {
        display: grid;
        gap: 10px;
      }
      .form input,
      .form select,
      .form textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 9px;
      }
      .two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .cards {
        grid-template-columns: repeat(5, 1fr);
        margin: 14px 0;
      }
      .summary {
        padding: 14px;
        cursor: pointer;
      }
      .summary.active {
        background: var(--blue2);
        border-color: #9bc7ff;
      }
      .images {
        display: grid;
        grid-template-columns: 260px 180px 1fr;
        gap: 14px;
      }
      .list {
        padding: 12px;
      }
      .list button {
        display: block;
        width: 100%;
        margin: 6px 0;
        text-align: left;
      }
      .thumbs {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px;
      }
      .thumb {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        cursor: pointer;
        background: #fff;
      }
      .thumb.active {
        outline: 3px solid #93c5fd;
      }
      .ph {
        height: 88px;
        border-radius: 8px;
        background: linear-gradient(135deg, #dbeafe, #f8fafc);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #4876b7;
        font-weight: 800;
        margin-bottom: 8px;
      }
      .toolbar {
        padding: 14px;
        display: flex;
        gap: 10px;
        align-items: end;
        flex-wrap: wrap;
      }
      .field label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        font-weight: 800;
        margin-bottom: 5px;
      }
      .field input,
      .field select {
        padding: 9px;
        border: 1px solid var(--line);
        border-radius: 9px;
      }
      .simple-layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 14px;
      }
      @media (max-width: 1000px) {
        .app {
          grid-template-columns: 1fr;
        }
        .side-nav {
          position: static;
        }
        .workspace,
        .images,
        .simple-layout {
          grid-template-columns: 1fr;
        }
        .flow,
        .cards {
          grid-template-columns: 1fr 1fr;
        }
        .search {
          min-width: 0;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side-nav">
        <div class="brand">CLAIM <b>ERP</b><small>Claim 운영센터</small></div>
        <a class="active" href="./smart-work.html">Smart업무관리</a
        ><a class="" href="./smart-receipt.html">Smart접수지</a
        ><a class="" href="./image-system.html">이미지시스템</a
        ><a class="" href="./approval-list.html">결재 LIST</a
        ><a class="" href="./delegation-rotation.html">전결&순환배당관리</a>
      </aside>
      <main class="main">
        <header class="topbar">
          <span class="tag">Smart업무관리</span
          ><span class="user">박지현 매니저 · Claim운영1팀</span>
        </header>
        <section class="page-head">
          <h1>Smart업무관리</h1>
          <p>오늘 처리해야 할 사고 Claim을 확인하고 바로 조치하세요.</p>
        </section>
        <section class="flow grid" id="flow"></section>
        <section class="workspace">
          <aside class="tabs card">
            <b>조치유형</b>
            <div id="tabs"></div>
            <button class="btn" id="all">전체보기</button>
          </aside>
          <section class="list-card card">
            <div class="list-head">
              <h2 id="listTitle">전체</h2>
              <input
                class="search"
                id="q"
                placeholder="사고번호, 정비공장, 차량번호, 담당자 검색"
              />
            </div>
            <table class="table">
              <thead>
                <tr>
                  <th>사고번호</th>
                  <th>단계</th>
                  <th>조치유형</th>
                  <th>고객</th>
                  <th>차량</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </section>
          <aside class="panel card" id="detail"></aside>
        </section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <div class="modal" id="modal"><div class="dialog" id="dialog"></div></div>
    <script>
      const claims = [
        {
          id: "CLM-2026-0001",
          stage: "접수·선견적",
          type: "계약확인",
          customer: "김민수",
          car: "12하3456",
          shop: "강남공업사",
          manager: "박지현",
          status: "진행중",
          memo: "계약정보 확인 필요",
        },
        {
          id: "CLM-2026-0002",
          stage: "수리 승인",
          type: "승인대기",
          customer: "이서연",
          car: "34허7788",
          shop: "서초모터스",
          manager: "최민재",
          status: "보류",
          memo: "부품 견적 확인",
        },
        {
          id: "CLM-2026-0003",
          stage: "손해사정",
          type: "AOS청구",
          customer: "정도윤",
          car: "56호9911",
          shop: "분당정비",
          manager: "박지현",
          status: "진행중",
          memo: "손해사정 결과 대기",
        },
        {
          id: "CLM-2026-0004",
          stage: "접수·선견적",
          type: "업체 미회신",
          customer: "한지우",
          car: "78가1234",
          shop: "수원공업사",
          manager: "김나비",
          status: "진행중",
          memo: "공업사 회신 요청 대상",
        },
        {
          id: "CLM-2026-0005",
          stage: "지급 / 정산",
          type: "정산대기",
          customer: "오하준",
          car: "90나4567",
          shop: "인천바디샵",
          manager: "최민재",
          status: "완료",
          memo: "지급자료 확인",
        },
      ];
      const $ = (s) => document.querySelector(s);
      function toast(m) {
        const t = $("#toast");
        t.textContent = m;
        t.classList.add("on");
        setTimeout(() => t.classList.remove("on"), 1800);
      }
      function closeModal() {
        $("#modal").classList.remove("on");
      }
      let stage = "",
        type = "",
        selected = claims[0].id;
      const stages = ["접수·선견적", "수리 승인", "손해사정", "지급 / 정산"];
      function scoped() {
        let q = $("#q").value.trim();
        return claims.filter(
          (c) =>
            (!stage || c.stage == stage) &&
            (!type || c.type == type) &&
            (!q || Object.values(c).join(" ").includes(q)),
        );
      }
      function renderFlow() {
        const root = $("#flow");
        root.innerHTML = stages
          .map(
            (s) =>
              `<button class="flow-card card ${stage == s ? "active" : ""}" data-stage="${s}">${s}<b>${claims.filter((c) => c.stage == s).length}</b></button>`,
          )
          .join("");
      }
      function renderTabs() {
        let types = [
          ...new Set(
            claims.filter((c) => !stage || c.stage == stage).map((c) => c.type),
          ),
        ];
        $("#tabs").innerHTML = types
          .map(
            (t) =>
              `<button class="btn tab ${type == t ? "active" : ""}" data-type="${t}">${t}</button>`,
          )
          .join("");
      }
      function renderRows() {
        let list = scoped();
        if (!list.some((c) => c.id == selected)) selected = list[0]?.id;
        $("#listTitle").textContent = stage || "전체";
        $("#rows").innerHTML =
          list
            .map(
              (c) =>
                `<tr class="${c.id == selected ? "active" : ""}" data-id="${c.id}"><td>${c.id}</td><td>${c.stage}</td><td>${c.type}</td><td>${c.customer}</td><td>${c.car}</td><td><span class="badge ${c.status == "완료" ? "done" : c.status == "보류" ? "hold" : ""}">${c.status}</span></td></tr>`,
            )
            .join("") ||
          '<tr><td colspan="6" class="muted">검색 결과가 없습니다.</td></tr>';
        renderDetail();
      }
      function renderDetail() {
        let c = claims.find((x) => x.id == selected) || claims[0];
        $("#detail").innerHTML =
          `<h2>빠른 처리</h2><div class="kv"><b>사고번호</b><span>${c.id}</span><b>고객</b><span>${c.customer}</span><b>정비공장</b><span>${c.shop}</span><b>담당자</b><span>${c.manager}</span><b>메모</b><span>${c.memo}</span></div><div class="actions"><button class="btn primary" id="act">공업사 요청</button><button class="btn" id="done">처리완료</button><button class="btn warn" id="hold">보류</button><a class="btn" href="./smart-receipt.html?claim=${c.id}">Smart접수지</a></div>`;
        $("#act").onclick = () => openAction(c);
        $("#done").onclick = () => {
          c.status = "완료";
          toast("처리완료로 변경했습니다.");
          renderRows();
        };
        $("#hold").onclick = () => {
          c.status = "보류";
          toast("보류로 변경했습니다.");
          renderRows();
        };
      }
      function openAction(c) {
        $("#dialog").innerHTML =
          `<h2>${c.id} 공업사 요청</h2><p class="muted">${c.shop}에 회신 요청 메시지를 발송합니다.</p><textarea id="msg" rows="5">${c.shop} 담당자님, ${c.id} 선견적 회신 부탁드립니다.</textarea><div class="actions"><button class="btn" onclick="closeModal()">닫기</button><button class="btn primary" id="send">발송</button></div>`;
        $("#modal").classList.add("on");
        $("#send").onclick = () => {
          closeModal();
          toast("공업사 요청을 발송했습니다.");
        };
      }
      $("#flow").onclick = (e) => {
        let b = e.target.closest("[data-stage]");
        if (b) {
          stage = b.dataset.stage;
          type = "";
          render();
        }
      };
      $("#tabs").onclick = (e) => {
        let b = e.target.closest("[data-type]");
        if (b) {
          type = b.dataset.type;
          renderTabs();
          renderRows();
        }
      };
      $("#rows").onclick = (e) => {
        let r = e.target.closest("[data-id]");
        if (r) {
          selected = r.dataset.id;
          renderRows();
        }
      };
      $("#q").oninput = renderRows;
      $("#all").onclick = () => {
        stage = "";
        type = "";
        $("#q").value = "";
        render();
      };
      function render() {
        renderFlow();
        renderTabs();
        renderRows();
      }
      render();
    </script>
  </body>
</html>
